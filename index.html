<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Service Tracker" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Rolex Service Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #8a6f2e;
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --bg4: #222222;
      --border: #2a2a2a;
      --border-gold: rgba(201,168,76,0.25);
      --text: #f0ece4;
      --text-dim: #7a756a;
      --text-mid: #b0a898;
      --green: #4caf82;
      --red: #c94c4c;
      --blue: #4c82c9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-gold);
      padding: env(safe-area-inset-top, 12px) 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--gold);
    }
    .topbar-subtitle { font-size: 9px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; }

    /* ── BOTTOM NAV ── */
    .bottomnav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(10,10,10,0.97);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-gold);
      padding: 10px 0 env(safe-area-inset-bottom, 10px);
      display: flex;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; color: var(--text-dim);
      font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em;
      cursor: pointer; padding: 4px 0; transition: color 0.2s;
    }
    .nav-btn.active { color: var(--gold); }
    .nav-btn svg { width: 20px; height: 20px; }

    /* ── PAGES ── */
    .page { display: none; padding: 0 0 90px; margin-top: 70px; }
    .page.active { display: block; }

    /* ── SECTION HEADER ── */
    .section-header {
      padding: 20px 20px 12px;
      display: flex; align-items: baseline; justify-content: space-between;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 400; color: var(--text);
      letter-spacing: 0.05em;
    }
    .section-meta { font-size: 10px; color: var(--text-dim); letter-spacing: 0.15em; }

    /* ── CARDS ── */
    .card {
      margin: 0 16px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .card:active { border-color: var(--gold-dim); }
    .card-header {
      padding: 14px 16px 10px;
      display: flex; align-items: flex-start; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .card-ref {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px; font-weight: 500; color: var(--gold);
      letter-spacing: 0.08em;
    }
    .card-model { font-size: 10px; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.1em; }
    .badge {
      font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 2px; font-weight: 500;
    }
    .badge-full { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid var(--border-gold); }
    .badge-assembly { background: rgba(76,130,201,0.12); color: var(--blue); border: 1px solid rgba(76,130,201,0.25); }
    .badge-active { background: rgba(76,175,130,0.12); color: var(--green); border: 1px solid rgba(76,175,130,0.25); }
    .badge-done { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid var(--border); }

    .card-body { padding: 12px 16px; }
    .card-progress {
      display: flex; gap: 3px; margin-bottom: 10px;
    }
    .progress-dot {
      flex: 1; height: 3px; border-radius: 1px;
      background: var(--border);
      transition: background 0.3s;
    }
    .progress-dot.done { background: var(--gold); }
    .progress-dot.active { background: var(--gold-light); animation: pulse-bar 1.5s ease-in-out infinite; }

    @keyframes pulse-bar {
      0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    .card-stats { display: flex; gap: 16px; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { font-size: 13px; color: var(--text); }
    .stat-lbl { font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }

    .card-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-date { font-size: 10px; color: var(--text-dim); }
    .card-action {
      font-size: 10px; color: var(--gold); letter-spacing: 0.1em;
      text-transform: uppercase; cursor: pointer;
    }

    /* ── ACTIVE STEP INDICATOR ── */
    .active-step {
      margin: 0 16px 12px;
      background: rgba(201,168,76,0.06);
      border: 1px solid var(--border-gold);
      border-radius: 4px;
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .active-step-info {}
    .active-step-label { font-size: 10px; color: var(--gold-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
    .active-step-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--text); }
    .active-step-timer { font-size: 22px; color: var(--gold); letter-spacing: 0.05em; font-weight: 300; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 80px); right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--gold); color: #000;
      border: none; cursor: pointer; z-index: 99;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(201,168,76,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fab:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(201,168,76,0.3); }
    .fab svg { width: 22px; height: 22px; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      display: none; align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      width: 100%; background: var(--bg2);
      border-top: 1px solid var(--border-gold);
      border-radius: 12px 12px 0 0;
      padding: 0 0 env(safe-area-inset-bottom, 20px);
      max-height: 92vh; overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-handle {
      width: 36px; height: 3px; background: var(--border);
      border-radius: 2px; margin: 12px auto 0;
    }
    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 400;
      padding: 16px 20px 0;
      color: var(--gold);
      letter-spacing: 0.08em;
    }
    .modal-body { padding: 16px 20px; }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 9px; color: var(--text-dim);
      letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 6px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 3px; color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 13px;
      padding: 10px 12px;
      outline: none; transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--gold-dim);
    }
    .form-textarea { resize: none; min-height: 80px; }
    .form-select option { background: var(--bg3); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── BUTTONS ── */
    .btn {
      width: 100%; padding: 13px;
      border-radius: 3px; border: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.18em;
      text-transform: uppercase; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); opacity: 0.85; }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-outline {
      background: none; color: var(--text-dim);
      border: 1px solid var(--border);
      margin-top: 8px;
    }
    .btn-danger { background: rgba(201,76,76,0.15); color: var(--red); border: 1px solid rgba(201,76,76,0.25); margin-top: 8px; }

    /* ── WORK PAGE ── */
    .steps-container { padding: 0 16px; }
    .steps-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px; color: var(--text-dim);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin: 16px 0 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .steps-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .step-item {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 4px; margin-bottom: 8px;
      overflow: hidden; transition: border-color 0.2s;
    }
    .step-item.step-active { border-color: var(--gold-dim); }
    .step-item.step-done { border-color: var(--border); opacity: 0.7; }

    .step-header {
      padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer;
    }
    .step-num {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--text-dim); flex-shrink: 0;
      transition: all 0.2s;
    }
    .step-active .step-num { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
    .step-done .step-num { border-color: var(--green); color: var(--green); background: rgba(76,175,130,0.1); }

    .step-info { flex: 1; }
    .step-name { font-size: 12px; color: var(--text); letter-spacing: 0.05em; }
    .step-duration { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    .step-timer-display {
      font-size: 15px; color: var(--gold); letter-spacing: 0.04em;
    }

    .step-actions {
      padding: 0 14px 12px;
      display: flex; gap: 8px;
    }
    .step-btn {
      flex: 1; padding: 9px; border-radius: 3px; border: none;
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.15s;
    }
    .step-btn:active { opacity: 0.7; }
    .step-btn-start { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid var(--border-gold); }
    .step-btn-stop { background: rgba(201,76,76,0.12); color: var(--red); border: 1px solid rgba(201,76,76,0.25); }
    .step-btn-note { background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); }

    .step-notes {
      padding: 0 14px 12px;
      font-size: 11px; color: var(--text-dim); line-height: 1.5;
      border-top: 1px solid var(--border); margin-top: 4px; padding-top: 10px;
    }
    .note-tag {
      display: inline-block;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 2px; padding: 2px 6px;
      font-size: 10px; color: var(--text-mid); margin: 2px 2px 0 0;
    }

    /* ── STATS PAGE ── */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 0 16px 16px;
    }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 4px; padding: 14px;
    }
    .stat-card-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; color: var(--gold); font-weight: 300;
    }
    .stat-card-lbl { font-size: 9px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px; }

    .chart-container {
      margin: 0 16px 16px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 4px; padding: 16px;
    }
    .chart-title {
      font-size: 9px; color: var(--text-dim);
      letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px;
    }
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-label { font-size: 10px; color: var(--text-dim); width: 90px; flex-shrink: 0; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
    .bar-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.6s ease; }
    .bar-val { font-size: 10px; color: var(--text-dim); width: 36px; text-align: right; flex-shrink: 0; }

    /* ── HISTORY PAGE ── */
    .history-item {
      margin: 0 16px 10px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 4px; padding: 14px 16px;
      cursor: pointer;
    }
    .history-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
    .history-ref {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px; color: var(--gold); letter-spacing: 0.08em;
    }
    .history-date { font-size: 10px; color: var(--text-dim); }
    .history-model { font-size: 10px; color: var(--text-mid); margin-bottom: 8px; }
    .history-times { display: flex; gap: 12px; flex-wrap: wrap; }
    .history-time { font-size: 10px; color: var(--text-dim); }
    .history-time span { color: var(--text-mid); }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 40px; text-align: center;
    }
    .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.3; }
    .empty-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; color: var(--text-dim); margin-bottom: 8px;
    }
    .empty-text { font-size: 11px; color: var(--text-dim); line-height: 1.6; }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: var(--border); margin: 4px 16px 16px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 90px);
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--bg3); border: 1px solid var(--border-gold);
      color: var(--text-mid); font-size: 11px; letter-spacing: 0.08em;
      padding: 10px 18px; border-radius: 3px;
      opacity: 0; transition: all 0.3s; pointer-events: none;
      white-space: nowrap; z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 1px; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <div class="topbar-title">⌚ Service Tracker</div>
    <div class="topbar-subtitle">Rolex Workshop</div>
  </div>
  <div id="topbar-clock" style="font-size:12px;color:var(--text-dim);letter-spacing:0.08em;"></div>
</div>

<!-- PAGES -->

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="section-header">
    <div class="section-title">Активные</div>
    <div class="section-meta" id="home-count">— часов</div>
  </div>
  <div id="active-jobs-list"></div>
  <div class="divider"></div>
  <div class="section-header">
    <div class="section-title">Последние</div>
    <div class="section-meta" id="recent-count"></div>
  </div>
  <div id="recent-jobs-list"></div>
</div>

<!-- WORK (active job detail) -->
<div class="page" id="page-work">
  <div class="section-header" style="flex-direction:column;align-items:flex-start;gap:4px;">
    <div style="display:flex;align-items:center;gap:10px;width:100%;">
      <button onclick="goBack()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;padding:0;font-size:18px;">←</button>
      <div>
        <div id="work-ref" style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);"></div>
        <div id="work-model" style="font-size:10px;color:var(--text-dim);margin-top:1px;"></div>
      </div>
      <div style="margin-left:auto;" id="work-badge"></div>
    </div>
  </div>
  <div id="work-steps-container" class="steps-container"></div>
  <div style="padding:16px;">
    <button class="btn btn-gold" onclick="completeJob()">Завершить работу</button>
    <button class="btn btn-danger" onclick="deleteJob()">Удалить запись</button>
  </div>
</div>

<!-- STATS -->
<div class="page" id="page-stats">
  <div class="section-header">
    <div class="section-title">Статистика</div>
    <div class="section-meta" id="stats-period">Всё время</div>
  </div>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="chart-container">
    <div class="chart-title">Среднее время по этапам (мин)</div>
    <div class="bar-chart" id="stage-chart"></div>
  </div>
  <div class="chart-container">
    <div class="chart-title">Full Service vs Только Сборка</div>
    <div class="bar-chart" id="type-chart"></div>
  </div>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <div class="section-header">
    <div class="section-title">История</div>
    <div class="section-meta" id="history-count"></div>
  </div>
  <div id="history-list"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottomnav">
  <button class="nav-btn active" id="nav-home" onclick="navigate('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12L12 3l9 9"/><path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>
    Главная
  </button>
  <button class="nav-btn" id="nav-stats" onclick="navigate('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="6" width="4" height="15"/><rect x="17" y="9" width="4" height="12"/></svg>
    Статистика
  </button>
  <button class="nav-btn" id="nav-history" onclick="navigate('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    История
  </button>
</div>

<!-- FAB -->
<button class="fab" onclick="openNewJobModal()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- MODAL: New Job -->
<div class="modal-overlay" id="modal-new">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Новые часы</div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ref номер</label>
          <input class="form-input" id="inp-ref" placeholder="126610LN" autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">Модель</label>
          <input class="form-input" id="inp-model" placeholder="Submariner" autocomplete="off" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Серийный номер</label>
        <input class="form-input" id="inp-serial" placeholder="опционально" autocomplete="off" />
      </div>
      <div class="form-group">
        <label class="form-label">Тип работы</label>
        <select class="form-select" id="inp-type">
          <option value="full">Full Service + Сборка</option>
          <option value="assembly">Только Сборка</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Заметка (опционально)</label>
        <textarea class="form-textarea" id="inp-note" placeholder="Состояние часов, особенности..."></textarea>
      </div>
      <button class="btn btn-gold" onclick="createJob()">Начать работу</button>
      <button class="btn btn-outline" onclick="closeModal('modal-new')">Отмена</button>
    </div>
  </div>
</div>

<!-- MODAL: Step Note -->
<div class="modal-overlay" id="modal-note">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="note-modal-title">Заметка к этапу</div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Проблемы / наблюдения</label>
        <textarea class="form-textarea" id="note-problems" placeholder="Что обнаружили, какие сложности..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Использованные детали</label>
        <input class="form-input" id="note-parts" placeholder="напр. новый баланс, mainspring..." autocomplete="off" />
      </div>
      <button class="btn btn-gold" onclick="saveStepNote()">Сохранить</button>
      <button class="btn btn-outline" onclick="closeModal('modal-note')">Отмена</button>
    </div>
  </div>
</div>

<!-- MODAL: History Detail -->
<div class="modal-overlay" id="modal-history-detail">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="hd-ref"></div>
    <div class="modal-body" id="hd-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const FULL_STEPS = [
  { id: 'measure',   name: 'Замер показаний / осмотр' },
  { id: 'disassem',  name: 'Разборка' },
  { id: 'precleaning', name: 'Pre-cleaning + люфты' },
  { id: 'cleaning',  name: 'Cleaning (машина ~40 мин)' },
  { id: 'service',   name: 'Сборка механизма' },
  { id: 'mechcheck', name: 'Проверка хода механизма' },
];

const ASSEMBLY_STEPS = [
  { id: 'dial',      name: 'Установка циферблата' },
  { id: 'hands',     name: 'Выбор и установка стрелок' },
  { id: 'colleague', name: 'Проверка у коллеги' },
  { id: 'polish',    name: 'Проверка полировки корпуса' },
  { id: 'casebuild', name: 'Сборка корпуса (тюб, стекло, безель)' },
  { id: 'waterproof','name': 'Waterproof тест' },
  { id: 'mechanism', name: 'Установка механизма в корпус' },
  { id: 'cleanlook', name: 'Финальная проверка чистоты' },
  { id: 'close',     name: 'Закрытие + снятие показаний' },
  { id: 'bracelet',  name: 'Браслет + end links' },
  { id: 'qa',        name: 'Отправка на QA' },
];

function getStepsFor(type) {
  if (type === 'full') return [
    ...FULL_STEPS.map(s => ({...s, phase:'service'})),
    ...ASSEMBLY_STEPS.map(s => ({...s, phase:'assembly'}))
  ];
  return ASSEMBLY_STEPS.map(s => ({...s, phase:'assembly'}));
}

// ─── STORAGE ────────────────────────────────────────────────────────────────

function load() {
  try { return JSON.parse(localStorage.getItem('rst_data') || '{"jobs":[],"done":[]}'); }
  catch(e) { return {jobs:[], done:[]}; }
}
function save(d) { localStorage.setItem('rst_data', JSON.stringify(d)); }

// ─── STATE ──────────────────────────────────────────────────────────────────

let currentJobId = null;
let noteTargetStep = null;
let timers = {}; // jobId_stepId -> intervalId

// ─── CLOCK ──────────────────────────────────────────────────────────────────

function updateClock() {
  const now = new Date();
  document.getElementById('topbar-clock').textContent =
    now.toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ─── NAVIGATION ─────────────────────────────────────────────────────────────

function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page)?.classList.add('active');
  document.querySelector('.fab').style.display = page === 'home' ? 'flex' : 'none';

  if (page === 'stats') renderStats();
  if (page === 'history') renderHistory();
  if (page === 'home') renderHome();
}

function goBack() {
  navigate('home');
}

// ─── MODAL ──────────────────────────────────────────────────────────────────

function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ─── TOAST ──────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── FORMAT ─────────────────────────────────────────────────────────────────

function fmtMs(ms) {
  if (!ms || ms < 0) return '—';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}ч ${m%60}м`;
  if (m > 0) return `${m}м ${s%60}с`;
  return `${s}с`;
}

function fmtMsLive(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const mm = String(m%60).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  if (h > 0) return `${h}:${mm}:${ss}`;
  return `${mm}:${ss}`;
}

function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('ru', {day:'numeric', month:'short', year:'numeric'});
}

function totalTime(job) {
  return job.steps.reduce((acc, s) => acc + (s.elapsed || 0), 0);
}

// ─── CREATE JOB ─────────────────────────────────────────────────────────────

function openNewJobModal() {
  document.getElementById('inp-ref').value = '';
  document.getElementById('inp-model').value = '';
  document.getElementById('inp-serial').value = '';
  document.getElementById('inp-note').value = '';
  openModal('modal-new');
}

function createJob() {
  const ref = document.getElementById('inp-ref').value.trim();
  const model = document.getElementById('inp-model').value.trim();
  if (!ref) { showToast('Введите Ref номер'); return; }

  const type = document.getElementById('inp-type').value;
  const serial = document.getElementById('inp-serial').value.trim();
  const note = document.getElementById('inp-note').value.trim();

  const steps = getStepsFor(type).map(s => ({
    ...s, startTime: null, elapsed: 0, running: false,
    notes: '', parts: ''
  }));

  const job = {
    id: Date.now().toString(),
    ref, model, serial, type, note,
    createdAt: Date.now(),
    steps,
    done: false,
    completedAt: null
  };

  const d = load();
  d.jobs.push(job);
  save(d);

  closeModal('modal-new');
  showToast('Часы добавлены');
  renderHome();
  setTimeout(() => openJob(job.id), 300);
}

// ─── RENDER HOME ────────────────────────────────────────────────────────────

function renderHome() {
  const d = load();
  const active = d.jobs.filter(j => !j.done);
  const recent = (d.done || []).slice(-5).reverse();

  document.getElementById('home-count').textContent = active.length + ' активных';

  const al = document.getElementById('active-jobs-list');
  if (active.length === 0) {
    al.innerHTML = `<div class="empty-state"><div class="empty-icon">⌚</div><div class="empty-title">Нет активных работ</div><div class="empty-text">Нажмите + чтобы добавить часы</div></div>`;
  } else {
    al.innerHTML = active.map(j => jobCard(j)).join('');
  }

  const rl = document.getElementById('recent-jobs-list');
  document.getElementById('recent-count').textContent = recent.length > 0 ? recent.length + ' завершённых' : '';
  if (recent.length === 0) {
    rl.innerHTML = `<div style="padding:12px 16px 0;font-size:11px;color:var(--text-dim);">Завершённые работы появятся здесь</div>`;
  } else {
    rl.innerHTML = recent.map(j => historyCard(j, true)).join('');
  }
}

function jobCard(j) {
  const steps = j.steps;
  const total = steps.length;
  const done = steps.filter(s => s.elapsed > 0 && !s.running).length;
  const activeStep = steps.find(s => s.running);
  const elapsed = totalTime(j);

  const dots = steps.map((s, i) => {
    let cls = '';
    if (s.running) cls = 'active';
    else if (s.elapsed > 0) cls = 'done';
    return `<div class="progress-dot ${cls}"></div>`;
  }).join('');

  const typeBadge = j.type === 'full'
    ? `<span class="badge badge-full">Full Service</span>`
    : `<span class="badge badge-assembly">Сборка</span>`;

  const statusBadge = activeStep
    ? `<span class="badge badge-active">● В работе</span>`
    : `<span class="badge">${done}/${total}</span>`;

  return `
  <div class="card" onclick="openJob('${j.id}')">
    <div class="card-header">
      <div>
        <div class="card-ref">${j.ref}</div>
        <div class="card-model">${j.model || '—'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        ${typeBadge}${statusBadge}
      </div>
    </div>
    <div class="card-body">
      <div class="card-progress">${dots}</div>
      <div class="card-stats">
        <div class="stat"><div class="stat-val">${fmtMs(elapsed) || '—'}</div><div class="stat-lbl">Потрачено</div></div>
        <div class="stat"><div class="stat-val">${done}/${total}</div><div class="stat-lbl">Этапов</div></div>
        ${activeStep ? `<div class="stat"><div class="stat-val" style="color:var(--gold)">${activeStep.name.split(' ')[0]}…</div><div class="stat-lbl">Сейчас</div></div>` : ''}
      </div>
    </div>
    <div class="card-footer">
      <div class="card-date">${fmtDate(j.createdAt)}</div>
      <div class="card-action">Открыть →</div>
    </div>
  </div>`;
}

// ─── OPEN JOB ───────────────────────────────────────────────────────────────

function openJob(id) {
  const d = load();
  const job = d.jobs.find(j => j.id === id) || (d.done||[]).find(j => j.id === id);
  if (!job) return;

  currentJobId = id;
  document.getElementById('work-ref').textContent = job.ref;
  document.getElementById('work-model').textContent = job.model || '';
  document.getElementById('work-badge').innerHTML = job.type === 'full'
    ? `<span class="badge badge-full">Full Service + Сборка</span>`
    : `<span class="badge badge-assembly">Только Сборка</span>`;

  renderWorkSteps(job);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-work').classList.add('active');
  document.querySelector('.fab').style.display = 'none';
}

function renderWorkSteps(job) {
  const container = document.getElementById('work-steps-container');
  let html = '';

  // Group by phase
  const phases = job.type === 'full'
    ? [{id:'service', label:'Full Service'}, {id:'assembly', label:'Сборка'}]
    : [{id:'assembly', label:'Сборка'}];

  phases.forEach(phase => {
    html += `<div class="steps-title">${phase.label}</div>`;
    job.steps.filter(s => s.phase === phase.id).forEach((step, idx) => {
      const globalIdx = job.steps.indexOf(step);
      const isDone = step.elapsed > 0 && !step.running;
      const isActive = step.running;

      let cls = '';
      if (isActive) cls = 'step-active';
      else if (isDone) cls = 'step-done';

      const elapsed = step.elapsed || 0;

      html += `
      <div class="step-item ${cls}" id="step-${job.id}-${step.id}">
        <div class="step-header">
          <div class="step-num">${isDone ? '✓' : (isActive ? '●' : (globalIdx+1))}</div>
          <div class="step-info">
            <div class="step-name">${step.name}</div>
            <div class="step-duration">${isDone ? fmtMs(elapsed) : (isActive ? 'В процессе...' : 'Не начат')}</div>
          </div>
          ${isActive ? `<div class="step-timer-display" id="timer-${job.id}-${step.id}">00:00</div>` : ''}
          ${isDone ? `<div style="font-size:12px;color:var(--green);">${fmtMs(elapsed)}</div>` : ''}
        </div>
        <div class="step-actions">
          ${!isDone && !isActive ? `<button class="step-btn step-btn-start" onclick="startStep('${job.id}','${step.id}')">▶ Старт</button>` : ''}
          ${isActive ? `<button class="step-btn step-btn-stop" onclick="stopStep('${job.id}','${step.id}')">■ Стоп</button>` : ''}
          <button class="step-btn step-btn-note" onclick="openStepNote('${job.id}','${step.id}')">✎ Заметка</button>
          ${isDone ? `<button class="step-btn step-btn-start" onclick="restartStep('${job.id}','${step.id}')">↺ Перезапуск</button>` : ''}
        </div>
        ${(step.notes || step.parts) ? `
        <div class="step-notes">
          ${step.notes ? `<div style="margin-bottom:4px;">${step.notes}</div>` : ''}
          ${step.parts ? `<span class="note-tag">🔧 ${step.parts}</span>` : ''}
        </div>` : ''}
      </div>`;
    });
  });

  container.innerHTML = html;

  // Resume any running timers
  job.steps.forEach(step => {
    if (step.running && step.startTime) {
      startTimerDisplay(job.id, step.id, step.startTime, step.elapsed || 0);
    }
  });
}

// ─── STEP CONTROLS ──────────────────────────────────────────────────────────

function startStep(jobId, stepId) {
  const d = load();
  const job = d.jobs.find(j => j.id === jobId);
  if (!job) return;
  const step = job.steps.find(s => s.id === stepId);
  if (!step) return;

  step.running = true;
  step.startTime = Date.now();
  save(d);

  openJob(jobId);
  showToast('Этап начат');
}

function stopStep(jobId, stepId) {
  const d = load();
  const job = d.jobs.find(j => j.id === jobId);
  if (!job) return;
  const step = job.steps.find(s => s.id === stepId);
  if (!step) return;

  const now = Date.now();
  step.elapsed = (step.elapsed || 0) + (now - step.startTime);
  step.running = false;
  step.startTime = null;
  save(d);

  clearInterval(timers[jobId + '_' + stepId]);
  delete timers[jobId + '_' + stepId];

  openJob(jobId);
  showToast('Этап завершён: ' + fmtMs(step.elapsed));
}

function restartStep(jobId, stepId) {
  const d = load();
  const job = d.jobs.find(j => j.id === jobId);
  const step = job?.steps.find(s => s.id === stepId);
  if (!step) return;
  step.running = true;
  step.startTime = Date.now();
  save(d);
  openJob(jobId);
}

function startTimerDisplay(jobId, stepId, startTime, prevElapsed) {
  const key = jobId + '_' + stepId;
  clearInterval(timers[key]);
  timers[key] = setInterval(() => {
    const el = document.getElementById(`timer-${jobId}-${stepId}`);
    if (!el) { clearInterval(timers[key]); return; }
    const total = prevElapsed + (Date.now() - startTime);
    el.textContent = fmtMsLive(total);
  }, 500);
}

// ─── STEP NOTES ─────────────────────────────────────────────────────────────

function openStepNote(jobId, stepId) {
  const d = load();
  const job = d.jobs.find(j => j.id === jobId);
  const step = job?.steps.find(s => s.id === stepId);
  if (!step) return;

  noteTargetStep = {jobId, stepId};
  document.getElementById('note-modal-title').textContent = step.name;
  document.getElementById('note-problems').value = step.notes || '';
  document.getElementById('note-parts').value = step.parts || '';
  openModal('modal-note');
}

function saveStepNote() {
  if (!noteTargetStep) return;
  const {jobId, stepId} = noteTargetStep;
  const d = load();
  const job = d.jobs.find(j => j.id === jobId);
  const step = job?.steps.find(s => s.id === stepId);
  if (!step) return;

  step.notes = document.getElementById('note-problems').value.trim();
  step.parts = document.getElementById('note-parts').value.trim();
  save(d);

  closeModal('modal-note');
  openJob(jobId);
  showToast('Заметка сохранена');
}

// ─── COMPLETE / DELETE JOB ──────────────────────────────────────────────────

function completeJob() {
  if (!currentJobId) return;
  const d = load();
  const idx = d.jobs.findIndex(j => j.id === currentJobId);
  if (idx === -1) return;

  const job = d.jobs[idx];

  // Stop any running steps
  job.steps.forEach(step => {
    if (step.running) {
      step.elapsed = (step.elapsed||0) + (Date.now() - step.startTime);
      step.running = false;
      step.startTime = null;
    }
  });

  job.done = true;
  job.completedAt = Date.now();

  d.jobs.splice(idx, 1);
  if (!d.done) d.done = [];
  d.done.push(job);
  save(d);

  showToast('Работа завершена ✓');
  navigate('home');
}

function deleteJob() {
  if (!currentJobId) return;
  if (!confirm('Удалить эту запись?')) return;
  const d = load();
  d.jobs = d.jobs.filter(j => j.id !== currentJobId);
  save(d);
  showToast('Удалено');
  navigate('home');
}

// ─── HISTORY ────────────────────────────────────────────────────────────────

function historyCard(j, compact) {
  const total = totalTime(j);
  const fsTime = j.steps.filter(s => s.phase === 'service').reduce((a,s) => a+(s.elapsed||0), 0);
  const asTime = j.steps.filter(s => s.phase === 'assembly').reduce((a,s) => a+(s.elapsed||0), 0);

  return `
  <div class="history-item" onclick="openHistoryDetail('${j.id}')">
    <div class="history-header">
      <div class="history-ref">${j.ref}</div>
      <div class="history-date">${fmtDate(j.completedAt || j.createdAt)}</div>
    </div>
    <div class="history-model">${j.model || '—'} ${j.serial ? '· ' + j.serial : ''}</div>
    <div class="history-times">
      <div class="history-time">Итого: <span>${fmtMs(total)}</span></div>
      ${j.type === 'full' ? `<div class="history-time">Service: <span>${fmtMs(fsTime)}</span></div>` : ''}
      <div class="history-time">Сборка: <span>${fmtMs(asTime)}</span></div>
    </div>
  </div>`;
}

function renderHistory() {
  const d = load();
  const done = (d.done || []).slice().reverse();
  document.getElementById('history-count').textContent = done.length + ' часов';
  const list = document.getElementById('history-list');
  if (done.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">История пуста</div><div class="empty-text">Завершённые работы появятся здесь</div></div>`;
  } else {
    list.innerHTML = done.map(j => historyCard(j, false)).join('');
  }
}

function openHistoryDetail(id) {
  const d = load();
  const job = (d.done || []).find(j => j.id === id);
  if (!job) return;

  document.getElementById('hd-ref').textContent = job.ref + (job.model ? ' · ' + job.model : '');

  let html = '';
  const phases = job.type === 'full'
    ? [{id:'service', label:'Full Service'}, {id:'assembly', label:'Сборка'}]
    : [{id:'assembly', label:'Сборка'}];

  phases.forEach(phase => {
    html += `<div style="font-size:9px;color:var(--text-dim);letter-spacing:0.15em;text-transform:uppercase;margin:12px 0 8px;">${phase.label}</div>`;
    job.steps.filter(s => s.phase === phase.id).forEach(step => {
      html += `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);">
        <div>
          <div style="font-size:12px;color:var(--text);">${step.name}</div>
          ${step.notes ? `<div style="font-size:10px;color:var(--text-dim);margin-top:3px;">${step.notes}</div>` : ''}
          ${step.parts ? `<span class="note-tag" style="margin-top:4px;">🔧 ${step.parts}</span>` : ''}
        </div>
        <div style="font-size:12px;color:var(--gold);flex-shrink:0;margin-left:12px;">${fmtMs(step.elapsed)}</div>
      </div>`;
    });
  });

  const total = totalTime(job);
  html += `<div style="display:flex;justify-content:space-between;padding:14px 0 0;margin-top:4px;">
    <div style="font-size:11px;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;">Итого</div>
    <div style="font-size:16px;color:var(--gold);font-family:'Cormorant Garamond',serif;">${fmtMs(total)}</div>
  </div>`;

  if (job.note) {
    html += `<div style="margin-top:12px;padding:10px;background:var(--bg3);border-radius:3px;font-size:11px;color:var(--text-dim);">${job.note}</div>`;
  }

  html += `<button class="btn btn-outline" style="margin-top:16px;" onclick="closeModal('modal-history-detail')">Закрыть</button>`;

  document.getElementById('hd-body').innerHTML = html;
  openModal('modal-history-detail');
}

// ─── STATS ──────────────────────────────────────────────────────────────────

function renderStats() {
  const d = load();
  const all = [...(d.jobs||[]), ...(d.done||[])];
  const done = d.done || [];

  const totalJobs = done.length;
  const fullJobs = done.filter(j => j.type === 'full').length;
  const assemblyOnly = done.filter(j => j.type === 'assembly').length;

  const avgTotal = totalJobs > 0
    ? done.reduce((a,j) => a + totalTime(j), 0) / totalJobs
    : 0;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-card-val">${totalJobs}</div><div class="stat-card-lbl">Завершено</div></div>
    <div class="stat-card"><div class="stat-card-val">${fmtMs(avgTotal)}</div><div class="stat-card-lbl">Среднее время</div></div>
    <div class="stat-card"><div class="stat-card-val">${fullJobs}</div><div class="stat-card-lbl">Full Service</div></div>
    <div class="stat-card"><div class="stat-card-val">${assemblyOnly}</div><div class="stat-card-lbl">Только Сборка</div></div>
  `;

  // Stage avg chart
  const stageChart = document.getElementById('stage-chart');
  if (done.length === 0) {
    stageChart.innerHTML = `<div style="font-size:11px;color:var(--text-dim);text-align:center;padding:12px;">Нет данных</div>`;
  } else {
    const stageMap = {};
    done.forEach(j => {
      j.steps.forEach(s => {
        if (!stageMap[s.id]) stageMap[s.id] = {name: s.name, total: 0, count: 0};
        if (s.elapsed > 0) {
          stageMap[s.id].total += s.elapsed;
          stageMap[s.id].count++;
        }
      });
    });

    const stages = Object.values(stageMap).filter(s => s.count > 0)
      .map(s => ({name: s.name, avg: s.total / s.count}))
      .sort((a,b) => b.avg - a.avg)
      .slice(0, 8);

    const maxAvg = Math.max(...stages.map(s => s.avg), 1);
    stageChart.innerHTML = stages.map(s => `
      <div class="bar-row">
        <div class="bar-label" title="${s.name}">${s.name.split(' ')[0]}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(s.avg/maxAvg*100).toFixed(1)}%"></div></div>
        <div class="bar-val">${Math.round(s.avg/60000)}м</div>
      </div>`).join('');
  }

  // Type chart
  const typeChart = document.getElementById('type-chart');
  const avgFull = fullJobs > 0 ? done.filter(j=>j.type==='full').reduce((a,j)=>a+totalTime(j),0)/fullJobs : 0;
  const avgAssembly = assemblyOnly > 0 ? done.filter(j=>j.type==='assembly').reduce((a,j)=>a+totalTime(j),0)/assemblyOnly : 0;
  const maxT = Math.max(avgFull, avgAssembly, 1);

  typeChart.innerHTML = `
    <div class="bar-row">
      <div class="bar-label">Full Service</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(avgFull/maxT*100).toFixed(1)}%"></div></div>
      <div class="bar-val">${fmtMs(avgFull)}</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">Только Сборка</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(avgAssembly/maxT*100).toFixed(1)}%;background:var(--blue)"></div></div>
      <div class="bar-val">${fmtMs(avgAssembly)}</div>
    </div>`;
}

// ─── INIT ────────────────────────────────────────────────────────────────────

renderHome();
</script>
</body>
</html>
