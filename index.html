<!DOCTYPE html>

<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Service Tracker" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Service Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c; --gold-light: #e8c97a; --gold-dim: #8a6f2e;
      --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a; --bg4: #222222;
      --border: #2a2a2a; --border-gold: rgba(201,168,76,0.25);
      --text: #f0ece4; --text-dim: #7a756a; --text-mid: #b0a898;
      --green: #4caf82; --red: #c94c4c; --blue: #4c82c9;
    }
    :root.light {
      --gold: #a07828; --gold-light: #c9a84c; --gold-dim: #7a5c1e;
      --bg: #f5f2ed; --bg2: #ffffff; --bg3: #ede9e2; --bg4: #e0dbd2;
      --border: #d4cfc6; --border-gold: rgba(160,120,40,0.25);
      --text: #1a1814; --text-dim: #8a8278; --text-mid: #5a5550;
      --green: #2e7d54; --red: #a83232; --blue: #2e5ca8;
    }
    :root.light .topbar { background: rgba(245,242,237,0.95); }
    :root.light .bottomnav { background: rgba(245,242,237,0.97); }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; font-size: 18px; min-height: 100vh; overflow-x: hidden; }
    .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-gold); padding: max(env(safe-area-inset-top), 20px) 20px 16px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-title { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 600; color: var(--gold); }
    .topbar-subtitle { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.15em; }
    .bottomnav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,10,0.97); backdrop-filter: blur(12px); border-top: 1px solid var(--border-gold); padding: 14px 0 max(env(safe-area-inset-bottom), 16px); display: flex; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; color: var(--text-dim); font-family: 'Outfit', sans-serif; font-size: 12px; cursor: pointer; padding: 4px 0; transition: color 0.2s; }
    .nav-btn.active { color: var(--gold); }
    .nav-btn svg { width: 22px; height: 22px; }
    .page { display: none; padding: 0 0 100px; margin-top: 80px; }
    .page.active { display: block; }
    .section-header { padding: 20px 20px 12px; display: flex; align-items: baseline; justify-content: space-between; }
    .section-title { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 500; color: var(--text); }
    .section-meta { font-size: 13px; color: var(--text-dim); }
    .card { margin: 0 16px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
    .card:active { border-color: var(--gold-dim); }
    .card-header { padding: 14px 16px 10px; display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .card-ref { font-size: 20px; font-weight: 600; color: var(--gold); }
    .card-model { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .badge-full { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid var(--border-gold); }
    .badge-assembly { background: rgba(76,130,201,0.12); color: var(--blue); border: 1px solid rgba(76,130,201,0.25); }
    .badge-active { background: rgba(76,175,130,0.12); color: var(--green); border: 1px solid rgba(76,175,130,0.25); }
    .badge-dorabotka { background: rgba(230,200,50,0.15); color: #e6c832; border: 1px solid rgba(230,200,50,0.4); }
    .badge-vozvrat { background: rgba(230,130,30,0.15); color: #e6821e; border: 1px solid rgba(230,130,30,0.4); }
    .card-dorabotka { border-color: rgba(230,200,50,0.4) !important; }
    .card-vozvrat { border-color: rgba(230,130,30,0.4) !important; }
    .card-body { padding: 12px 16px; }
    .card-progress { display: flex; gap: 3px; margin-bottom: 10px; }
    .progress-dot { flex: 1; height: 3px; border-radius: 1px; background: var(--border); transition: background 0.3s; }
    .progress-dot.done { background: var(--gold); }
    .progress-dot.active { background: var(--gold-light); animation: pulse-bar 1.5s ease-in-out infinite; }
    @keyframes pulse-bar { 0%,100%{opacity:1}50%{opacity:0.4} }
    .card-stats { display: flex; gap: 16px; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { font-size: 16px; font-weight: 600; color: var(--text); }
    .stat-lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
    .card-footer { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-date { font-size: 13px; color: var(--text-dim); }
    .card-action { font-size: 13px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; }
    .fab { position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 80px); right: 20px; width: 54px; height: 54px; border-radius: 50%; background: var(--gold); color: #000; border: none; cursor: pointer; z-index: 99; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(201,168,76,0.4); transition: transform 0.2s; }
    .fab:active { transform: scale(0.93); }
    .fab svg { width: 24px; height: 24px; }
    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; align-items: flex-end; }
    .modal-overlay.open { display: flex; }
    .modal { width: 100%; background: var(--bg2); border-top: 1px solid var(--border-gold); border-radius: 16px 16px 0 0; padding: 0 0 env(safe-area-inset-bottom, 20px); max-height: 92vh; overflow-y: auto; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-handle { width: 36px; height: 3px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
    .modal-title { font-size: 22px; font-weight: 600; padding: 16px 20px 0; color: var(--gold); }
    .modal-body { padding: 16px 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
    .form-input, .form-select, .form-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 16px; padding: 12px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold-dim); }
    .form-textarea { resize: none; min-height: 80px; }
    .form-select option { background: var(--bg3); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn { width: 100%; padding: 14px; border-radius: 6px; border: none; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 0.05em; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
    .btn:active { transform: scale(0.98); opacity: 0.85; }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-outline { background: none; color: var(--text-dim); border: 1px solid var(--border); margin-top: 8px; }
    .btn-danger { background: rgba(201,76,76,0.15); color: var(--red); border: 1px solid rgba(201,76,76,0.25); margin-top: 8px; }
    .steps-container { padding: 0 16px; }
    .phase-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
    .phase-block-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .phase-block-header:active { opacity: 0.7; }
    .phase-block-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .phase-block-meta { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .phase-block-right { display: flex; align-items: center; gap: 8px; }
    .phase-total { font-size: 16px; color: var(--gold); font-weight: 700; }
    .phase-chevron { font-size: 11px; color: var(--text-dim); transition: transform 0.25s; display: inline-block; }
    .phase-chevron.open { transform: rotate(180deg); }
    .phase-quick-times { padding: 0 14px 14px; border-top: 1px solid var(--border); }
    .phase-qt-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; margin: 12px 0 8px; }
    .phase-qt-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .phase-qt-btn { padding: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; flex: 1; text-align: center; }
    .phase-qt-btn:active { background: var(--bg4); border-color: var(--gold-dim); color: var(--gold); }
    .phase-qt-btn-custom { background: none; border-style: dashed; color: var(--text-dim); flex: 1; }
    .phase-steps-detail { border-top: 1px solid var(--border); display: none; padding: 8px 0; }
    .phase-steps-detail.open { display: block; }
    .step-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; margin: 0 10px 8px; overflow: hidden; transition: border-color 0.2s; }
    .step-item.step-active { border-color: var(--gold-dim); }
    .step-item.step-done { opacity: 0.75; }
    .step-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--text-dim); flex-shrink: 0; transition: all 0.2s; }
    .step-active .step-num { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
    .step-done .step-num { border-color: var(--green); color: var(--green); background: rgba(76,175,130,0.1); }
    .step-info { flex: 1; }
    .step-name { font-size: 15px; color: var(--text); }
    .step-duration { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .step-timer-display { font-size: 18px; color: var(--gold); font-weight: 600; }
    .step-actions { padding: 0 14px 12px; display: flex; gap: 8px; }
    .step-btn { flex: 1; padding: 10px; border-radius: 6px; border: none; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .step-btn:active { opacity: 0.7; }
    .step-btn-start { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid var(--border-gold); }
    .step-btn-stop { background: rgba(201,76,76,0.12); color: var(--red); border: 1px solid rgba(201,76,76,0.25); }
    .step-btn-note { background: var(--bg4); color: var(--text-dim); border: 1px solid var(--border); }
    .step-notes { padding: 0 14px 12px; font-size: 13px; color: var(--text-dim); line-height: 1.5; border-top: 1px solid var(--border); padding-top: 10px; }
    .note-tag { display: inline-block; background: var(--bg4); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 12px; color: var(--text-mid); margin: 2px 2px 0 0; }
    .quick-time-row { padding: 0 14px 12px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .qt-btn { padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg4); color: var(--text-dim); font-family: 'Outfit', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .qt-btn:active { background: var(--bg); color: var(--gold); border-color: var(--gold-dim); }
    .qt-btn-custom { background: none; border-style: dashed; }
    .speed-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .speed-fast { background: rgba(76,175,130,0.15); color: #4caf82; border: 1px solid rgba(76,175,130,0.35); }
    .speed-mid  { background: rgba(255,193,7,0.15); color: #e6ac00; border: 1px solid rgba(255,193,7,0.35); }
    .speed-slow { background: rgba(201,76,76,0.15); color: #c94c4c; border: 1px solid rgba(201,76,76,0.35); }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 16px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
    .stat-card-val { font-size: 30px; color: var(--gold); font-weight: 300; }
    .stat-card-lbl { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 4px; }
    .chart-container { margin: 0 16px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .chart-title { font-size: 12px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 14px; }
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-label { font-size: 13px; color: var(--text-dim); width: 100px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.6s ease; }
    .bar-val { font-size: 13px; color: var(--text-dim); width: 42px; text-align: right; flex-shrink: 0; }
    .history-item { margin: 0 16px 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; cursor: pointer; }
    .history-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
    .history-ref { font-size: 18px; font-weight: 600; color: var(--gold); }
    .history-date { font-size: 13px; color: var(--text-dim); }
    .history-model { font-size: 13px; color: var(--text-mid); margin-bottom: 8px; }
    .history-times { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .history-time { font-size: 13px; color: var(--text-dim); }
    .history-time span { color: var(--text-mid); }
    .empty-state { display: flex; flex-direction: column; align-items: center; padding: 60px 40px; text-align: center; }
    .empty-icon { font-size: 44px; margin-bottom: 16px; opacity: 0.3; }
    .empty-title { font-size: 22px; font-weight: 500; color: var(--text-dim); margin-bottom: 8px; }
    .empty-text { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
    .divider { height: 1px; background: var(--border); margin: 4px 16px 16px; }
    .toast { position: fixed; bottom: calc(env(safe-area-inset-bottom,0px) + 90px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 1px solid var(--border-gold); color: var(--text-mid); font-size: 13px; padding: 10px 18px; border-radius: 6px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 300; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .badge-vozvrat { background: rgba(230,130,20,0.15); color: #e67e1e; border: 1px solid rgba(230,130,20,0.4); }
    .card-vozvrat { border-color: rgba(230,130,20,0.5) !important; }
    .vozvrat-block { margin: 0 16px 12px; background: rgba(230,130,20,0.06); border: 1px solid rgba(230,130,20,0.3); border-radius: 10px; overflow: hidden; }
    .vozvrat-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    .vozvrat-title { font-size: 15px; font-weight: 700; color: #e67e1e; }
    .vozvrat-item { padding: 10px 16px; border-top: 1px solid rgba(230,130,20,0.2); display: flex; justify-content: space-between; align-items: flex-start; }
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 1px; }
  </style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">&#x231a; Service Tracker</div>
    <div class="topbar-subtitle">Workshop Log</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <button onclick="toggleTheme()" id="theme-btn" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-family:'Outfit',sans-serif;font-size:12px;padding:5px 10px;cursor:pointer;">&#x2600;&#xFE0F; &#1057;&#1074;&#1077;&#1090;&#1083;&#1072;&#1103;</button>
    <div id="topbar-clock" style="font-size:13px;color:var(--text-dim);"></div>
  </div>
</div>

<div class="page active" id="page-home">
  <div class="section-header">
    <div class="section-title">&#1040;&#1082;&#1090;&#1080;&#1074;&#1085;&#1099;&#1077;</div>
    <div class="section-meta" id="home-count"></div>
  </div>
  <div style="padding:0 16px 12px;">
    <input class="form-input" id="home-search" placeholder="&#128269; &#1055;&#1086;&#1080;&#1089;&#1082;..." oninput="renderHome()" autocomplete="off" style="font-size:15px;" />
  </div>
  <div id="active-jobs-list"></div>
  <div class="divider"></div>
  <div class="section-header">
    <div class="section-title">&#1055;&#1086;&#1089;&#1083;&#1077;&#1076;&#1085;&#1080;&#1077;</div>
    <div class="section-meta" id="recent-count"></div>
  </div>
  <div id="recent-jobs-list"></div>
</div>

<div class="page" id="page-work">
  <div class="section-header" style="flex-direction:column;align-items:flex-start;gap:4px;">
    <div style="display:flex;align-items:center;gap:10px;width:100%;">
      <button onclick="goBack()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;padding:0;font-size:20px;">&#8592;</button>
      <div>
        <div id="work-ref" style="font-size:20px;font-weight:700;color:var(--gold);"></div>
        <div id="work-model" style="font-size:13px;color:var(--text-dim);margin-top:2px;"></div>
      </div>
      <div style="margin-left:auto;" id="work-badge"></div>
    </div>
  </div>
  <div id="work-steps-container" class="steps-container"></div>
  <div id="work-events-container"></div>
  <div style="padding:16px;">
    <button class="btn btn-gold" onclick="completeJob()">&#1047;&#1072;&#1074;&#1077;&#1088;&#1096;&#1080;&#1090;&#1100; &#1088;&#1072;&#1073;&#1086;&#1090;&#1091;</button>
    <button class="btn" style="background:rgba(230,200,50,0.1);color:#e6c832;border:1px solid rgba(230,200,50,0.35);margin-top:8px;" onclick="openEventModal('dorabotka')">&#8635; &#1044;&#1086;&#1088;&#1072;&#1073;&#1086;&#1090;&#1082;&#1072;</button>
    <button class="btn" style="background:rgba(230,130,30,0.1);color:#e6821e;border:1px solid rgba(230,130,30,0.35);margin-top:8px;" onclick="openEventModal('vozvrat')">&#8617; &#1042;&#1086;&#1079;&#1074;&#1088;&#1072;&#1090;</button>
    <button class="btn btn-danger" onclick="deleteJob()">&#1059;&#1076;&#1072;&#1083;&#1080;&#1090;&#1100; &#1079;&#1072;&#1087;&#1080;&#1089;&#1100;</button>
  </div>
</div>

<div class="page" id="page-stats">
  <div class="section-header">
    <div class="section-title">&#1057;&#1090;&#1072;&#1090;&#1080;&#1089;&#1090;&#1080;&#1082;&#1072;</div>
    <div class="section-meta">&#1042;&#1089;&#1105; &#1074;&#1088;&#1077;&#1084;&#1103;</div>
  </div>
  <div class="stats-grid" id="stats-grid"></div>
  <div id="stats-speed"></div>
  <div class="chart-container">
    <div class="chart-title">&#1057;&#1088;&#1077;&#1076;&#1085;&#1077;&#1077; &#1074;&#1088;&#1077;&#1084;&#1103; &#1087;&#1086; &#1101;&#1090;&#1072;&#1087;&#1072;&#1084;</div>
    <div class="bar-chart" id="stage-chart"></div>
  </div>
  <div class="chart-container">
    <div class="chart-title">Full Service vs &#1058;&#1086;&#1083;&#1100;&#1082;&#1086; &#1057;&#1073;&#1086;&#1088;&#1082;&#1072;</div>
    <div class="bar-chart" id="type-chart"></div>
  </div>
  <div style="margin:0 16px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;">
    <div style="font-size:12px;color:var(--text-dim);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:12px;">&#128190; &#1044;&#1072;&#1085;&#1085;&#1099;&#1077;</div>
    <button class="btn btn-outline" style="margin-top:0;" onclick="exportData()">&#8681; &#1069;&#1082;&#1089;&#1087;&#1086;&#1088;&#1090; &#1076;&#1072;&#1085;&#1085;&#1099;&#1093;</button>
    <div style="margin-top:10px;">
      <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importData(this)" />

<script>
const FULL_STEPS = [
  {id:'measure',    name:'\u0417\u0430\u043c\u0435\u0440 \u043f\u043e\u043a\u0430\u0437\u0430\u043d\u0438\u0439 / \u043e\u0441\u043c\u043e\u0442\u0440'},
  {id:'disassem',   name:'\u0420\u0430\u0437\u0431\u043e\u0440\u043a\u0430'},
  {id:'precleaning',name:'Pre-cleaning + \u043b\u044e\u0444\u0442\u044b'},
  {id:'cleaning',   name:'Cleaning (\u043c\u0430\u0448\u0438\u043d\u0430 ~40 \u043c\u0438\u043d)'},
  {id:'service',    name:'\u0421\u0431\u043e\u0440\u043a\u0430 \u043c\u0435\u0445\u0430\u043d\u0438\u0437\u043c\u0430'},
  {id:'mechcheck',  name:'\u041f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u0445\u043e\u0434\u0430 \u043c\u0435\u0445\u0430\u043d\u0438\u0437\u043c\u0430'},
];
const ASSEMBLY_STEPS = [
  {id:'dial',      name:'\u0423\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430 \u0446\u0438\u0444\u0435\u0440\u0431\u043b\u0430\u0442\u0430'},
  {id:'hands',     name:'\u0412\u044b\u0431\u043e\u0440 \u0438 \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430 \u0441\u0442\u0440\u0435\u043b\u043e\u043a'},
  {id:'colleague', name:'\u041f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u0443 \u043a\u043e\u043b\u043b\u0435\u0433\u0438'},
  {id:'polish',    name:'\u041f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u043f\u043e\u043b\u0438\u0440\u043e\u0432\u043a\u0438 \u043a\u043e\u0440\u043f\u0443\u0441\u0430'},
  {id:'casebuild', name:'\u0421\u0431\u043e\u0440\u043a\u0430 \u043a\u043e\u0440\u043f\u0443\u0441\u0430 (\u0442\u044e\u0431, \u0441\u0442\u0435\u043a\u043b\u043e, \u0431\u0435\u0437\u0435\u043b\u044c)'},
  {id:'waterproof',name:'Waterproof \u0442\u0435\u0441\u0442'},
  {id:'mechanism', name:'\u0423\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430 \u043c\u0435\u0445\u0430\u043d\u0438\u0437\u043c\u0430 \u0432 \u043a\u043e\u0440\u043f\u0443\u0441'},
  {id:'cleanlook', name:'\u0424\u0438\u043d\u0430\u043b\u044c\u043d\u0430\u044f \u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u0447\u0438\u0441\u0442\u043e\u0442\u044b'},
  {id:'close',     name:'\u0417\u0430\u043a\u0440\u044b\u0442\u0438\u0435 + \u0441\u043d\u044f\u0442\u0438\u0435 \u043f\u043e\u043a\u0430\u0437\u0430\u043d\u0438\u0439'},
  {id:'bracelet',  name:'\u0411\u0440\u0430\u0441\u043b\u0435\u0442 + end links'},
  {id:'qa',        name:'\u041e\u0442\u043f\u0440\u0430\u0432\u043a\u0430 \u043d\u0430 QA'},
];
function getStepsFor(type) {
  if (type === 'full') return [
    ...FULL_STEPS.map(s => ({...s, phase:'service'})),
    ...ASSEMBLY_STEPS.map(s => ({...s, phase:'assembly'}))
  ];
  return ASSEMBLY_STEPS.map(s => ({...s, phase:'assembly'}));
}

function load() {
  try {
    const raw = localStorage.getItem('rst_data');
    if (!raw) return {jobs:[], done:[]};
    const d = JSON.parse(raw);
    if (!d.jobs) d.jobs = [];
    if (!d.done) d.done = [];
    [...d.jobs, ...d.done].forEach(j => {
      if (!j.returns) j.returns = [];
      if (!j.dorabotki) j.dorabotki = [];
      if (!j.vozvrat) j.vozvrat = [];
      if (!j.steps) j.steps = [];
      j.steps.forEach(s => {
        if (!s.elapsed) s.elapsed = 0;
        if (s.running === undefined) s.running = false;
      });
    });
    return d;
  } catch(e) { return {jobs:[], done:[]}; }
}
function save(d) { localStorage.setItem('rst_data', JSON.stringify(d)); }

let currentJobId = null;
let noteTargetStep = null;
let customTimeTarget = null;
let phaseCustomTarget = null;
let currentEventType = null;
let editingEventId = null;
let timers = {};

function updateClock() {
  const el = document.getElementById('topbar-clock');
  if (el) el.textContent = new Date().toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

function fmtMs(ms) {
  if (!ms || ms <= 0) return '\u2014';
  const s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60);
  if (h > 0) return h+'\u0447 '+(m%60)+'\u043c';
  if (m > 0) return m+'\u043c '+(s%60)+'\u0441';
  return s+'\u0441';
}
function fmtMsLive(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60);
  return (h>0 ? h+':' : '') + String(m%60).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('ru', {day:'numeric', month:'short', year:'numeric'});
}
function totalTime(job) { return job.steps.reduce((a, s) => a + (s.elapsed||0), 0); }

function speedLevel(hours, type) {
  if (type === 'service') { if (hours <= 5) return 'fast'; if (hours <= 7) return 'mid'; return 'slow'; }
  else { if (hours < 3) return 'fast'; if (hours <= 4) return 'mid'; return 'slow'; }
}
function speedLabel(level) {
  if (level === 'fast') return '\u26a1 \u0411\u044b\u0441\u0442\u0440\u043e';
  if (level === 'mid') return '\u23f1 \u0425\u043e\u0440\u043e\u0448\u043e';
  return '\ud83d\udc22 \u0414\u043e\u043b\u0433\u043e';
}
function speedBadges(job) {
  const fsTime = job.steps.filter(s => s.phase==='service').reduce((a,s) => a+(s.elapsed||0), 0);
  const asTime = job.steps.filter(s => s.phase==='assembly').reduce((a,s) => a+(s.elapsed||0), 0);
  if (job.type === 'full') {
    const fsLevel = speedLevel(fsTime/3600000, 'service');
    const asLevel = speedLevel(asTime/3600000, 'assembly');
    return '<span class="speed-badge speed-'+fsLevel+'">FS: '+speedLabel(fsLevel)+'</span> <span class="speed-badge speed-'+asLevel+'">'+'\u0421\u0431: '+speedLabel(asLevel)+'</span>';
  } else {
    const asLevel = speedLevel(asTime/3600000, 'assembly');
    return '<span class="speed-badge speed-'+asLevel+'">'+speedLabel(asLevel)+'</span>';
  }
}

function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  const nb = document.getElementById('nav-'+page);
  if (nb) nb.classList.add('active');
  document.querySelector('.fab').style.display = page === 'home' ? 'flex' : 'none';
  if (page === 'stats') renderStats();
  if (page === 'history') renderHistory();
  if (page === 'home') renderHome();
}
function goBack() { navigate('home'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function renderHome() {
  const d = load();
  const q = (document.getElementById('home-search')?.value || '').toLowerCase().trim();
  let active = d.jobs.filter(j => !j.done);
  if (q) active = active.filter(j =>
    (j.serial||''). toLowerCase().includes(q)||(j.ref||''). toLowerCase().includes(q)||
    (j.model||''). toLowerCase().includes(q)||(j.note||''). toLowerCase().includes(q));
  const recent = (d.done||[]).slice(-5).reverse();
  document.getElementById('home-count').textContent = active.length + ' \u0430\u043a\u0442\u0438\u0432\u043d\u044b\u0445';
  const al = document.getElementById('active-jobs-list');
  al.innerHTML = active.length === 0
    ? '<div class="empty-state"><div class="empty-icon">&#9202;</div><div class="empty-title">'+(q?'\u041d\u0438\u0447\u0435\u0433\u043e \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\u043e':'\u041d\u0435\u0442 \u0430\u043a\u0442\u0438\u0432\u043d\u044b\u0445 \u0440\u0430\u0431\u043e\u0442')+'</div><div class="empty-text">'+(q?'':'\u041d\u0430\u0436\u043c\u0438\u0442\u0435 + \u0447\u0442\u043e\u0431\u044b \u0434\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0447\u0430\u0441\u044b')+'</div></div>'
    : active.map(jobCard).join('');
  const rl = document.getElementById('recent-jobs-list');
  document.getElementById('recent-count').textContent = recent.length > 0 ? recent.length+' \u0437\u0430\u0432\u0435\u0440\u0448\u0451\u043d\u043d\u044b\u0445' : '';
  rl.innerHTML = recent.length === 0
    ? '<div style="padding:12px 16px 0;font-size:13px;color:var(--text-dim);">\u0417\u0430\u0432\u0435\u0440\u0448\u0451\u043d\u043d\u044b\u0435 \u0440\u0430\u0431\u043e\u0442\u044b \u043f\u043e\u044f\u0432\u044f\u0442\u0441\u044f \u0437\u0434\u0435\u0441\u044c</div>'
    : recent.map(j => historyCard(j, true)).join('');
}

function jobCard(j) {
  const steps = j.steps, total = steps.length;
  const done = steps.filter(s => s.elapsed > 0 && !s.running).length;
  const activeStep = steps.find(s => s.running);
  const elapsed = totalTime(j);
  const dots = steps.map(s => '<div class="progress-dot '+(s.running?'active':(s.elapsed>0?'done':''))+'"></div>').join('');
  const hasDorab = j.dorabotki && j.dorabotki.length > 0;
  const hasVozvrat = j.vozvrat && j.vozvrat.length > 0;
  const typeBadge = j.type==='full'?'<span class="badge badge-full">Full Service</span>':'<span class="badge badge-assembly">\u0421\u0431\u043e\u0440\u043a\u0430</span>';
  const statusBadge = activeStep?'<span class="badge badge-active">&#9679; \u0412 \u0440\u0430\u0431\u043e\u0442\u0435</span>':'<span class="badge">'+done+'/'+total+'</span>';
  const dorabBadge = hasDorab?'<span class="badge badge-dorabotka">&#8635; \u0414\u043e\u0440\u0430\u0431\u043e\u0442\u043a\u0430 \xd7'+j.dorabotki.length+'</span>':'  ';
  const vozvratBadge = hasVozvrat?'<span class="badge badge-vozvrat">&#8617; \u0412\u043e\u0437\u0432\u0440\u0430\u0442 \xd7'+j.vozvrat.length+'</span>':'  ';
  const borderCls = hasVozvrat?'card-vozvrat':(hasDorab?'card-dorabotka':'');
  return '<div class="card '+borderCls+'" onclick="openJob(\''+ j.id+'\')">'+
    '<div class="card-header"><div>'+
    '<div class="card-ref">'+(j.serial||j.ref)+'</div>'+
    '<div class="card-model">'+(j.ref?'Ref '+j.ref:'')+(j.ref&&j.model?' \xb7 ':'')+( j.model||'')+'</div>'+
    '</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">'+
    typeBadge+statusBadge+dorabBadge+vozvratBadge+'</div></div>'+
    '<div class="card-body"><div class="card-progress">'+dots+'</div>'+
    '<div class="card-stats">'+
    '<div class="stat"><div class="stat-val">'+(fmtMs(elapsed)||'\u2014')+'</div><div class="stat-lbl">\u041f\u043e\u0442\u0440\u0430\u0447\u0435\u043d\u043e</div></div>'+
    '<div class="stat"><div class="stat-val">'+done+'/'+total+'</div><div class="stat-lbl">\u042d\u0442\u0430\u043f\u043e\u0432</div></div>'+
    (activeStep?'<div class="stat"><div class="stat-val" style="color:var(--gold)">'+activeStep.name.split(' ')[0]+'&#8230;</div><div class="stat-lbl">\u0421\u0435\u0439\u0447\u0430\u0441</div></div>':'')+
    '</div></div>'+
    '<div class="card-footer"><div class="card-date">'+fmtDate(j.createdAt)+'</div><div class="card-action">\u041e\u0442\u043a\u0440\u044b\u0442\u044c &#8594;</div></div>'+
    '</div>';
}

function openJob(id) {
  const d = load();
  const job = d.jobs.find(j => j.id === id) || (d.done||[]).find(j => j.id === id);
  if (!job) return;
  currentJobId = id;
  document.getElementById('work-ref').textContent = job.serial || job.ref;
  document.getElementById('work-model').textContent = (job.ref?'Ref '+job.ref:'')+(job.ref&&job.model?' \xb7 ':'')+( job.model||'')+'';
  document.getElementById('work-badge').innerHTML = job.type==='full'
    ?'<span class="badge badge-full">Full Service + \u0421\u0431\u043e\u0440\u043a\u0430</span>'
    :'<span class="badge badge-assembly">\u0422\u043e\u043b\u044c\u043a\u043e \u0421\u0431\u043e\u0440\u043a\u0430</span>';
  renderWorkSteps(job);
  renderJobEvents(job);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-work').classList.add('active');
  document.querySelector('.fab').style.display = 'none';
}

function renderWorkSteps(job) {
  const container = document.getElementById('work-steps-container');
  const phases = job.type==='full'
    ? [{id:'service', label:'Full Service'},{id:'assembly', label:'\u0421\u0431\u043e\u0440\u043a\u0430'}]
    : [{id:'assembly', label:'\u0421\u0431\u043e\u0440\u043a\u0430'}];
  let html = '';
  phases.forEach(phase => {
    const phaseSteps = job.steps.filter(s => s.phase === phase.id);
    const phaseElapsed = phaseSteps.reduce((a,s) => a+(s.elapsed||0), 0);
    const doneCount = phaseSteps.filter(s => s.elapsed > 0).length;
    const isOpen = job['detail_open_'+phase.id] || false;
    const qts = [{label:'15\u043c',min:15},{label:'30\u043c',min:30},{label:'1\u0447',min:60},{label:'2\u0447',min:120},{label:'4\u0447',min:240},{label:'8\u0447',min:480}];
    html += '<div class="phase-block" id="phase-'+job.id+'-'+phase.id+'">'+
      '<div class="phase-block-header" onclick="togglePhaseDetail(\''+ job.id+'\',\''+ phase.id+'\')">'+
      '<div><div class="phase-block-title">'+phase.label+'</div>'+
      '<div class="phase-block-meta">'+doneCount+'/'+phaseSteps.length+' \u044d\u0442\u0430\u043f\u043e\u0432'+(phaseElapsed>0?' \xb7 '+fmtMs(phaseElapsed):'')+'</div></div>'+
      '<div class="phase-block-right">'+(phaseElapsed>0?'<span class="phase-total">'+fmtMs(phaseElapsed)+'</span>':'')+
      '<span class="phase-chevron '+(isOpen?'open':'')+'">&#9660;</span></div></div>'+
      '<div class="phase-quick-times">'+
      '<div class="phase-qt-label">\u0411\u044b\u0441\u0442\u0440\u043e \u0437\u0430\u043f\u0438\u0441\u0430\u0442\u044c \u0432\u0440\u0435\u043c\u044f</div>'+
      '<div class="phase-qt-row">'+
      qts.map(t => '<button class="phase-qt-btn" onclick="addPhaseTime(\''+ job.id+'\',\''+ phase.id+'\','+t.min+')">'+ t.label+'</button>').join('')+
      '<button class="phase-qt-btn phase-qt-btn-custom" onclick="openPhaseCustomTime(\''+ job.id+'\',\''+ phase.id+'\')">&#9998;</button>'+
      '</div></div>'+
      '<div class="phase-steps-detail '+(isOpen?'open':'')+'" id="detail-'+job.id+'-'+phase.id+'">';
    phaseSteps.forEach(step => {
      const gIdx = job.steps.indexOf(step);
      const isDone = step.elapsed > 0 && !step.running;
      const isActive = step.running;
      const cls = isActive?'step-active':(isDone?'step-done':'');
      html += '<div class="step-item '+cls+'" id="step-'+job.id+'-'+step.id+'">'+
        '<div class="step-header">'+
        '<div class="step-num">'+(isDone?'&#10003;':(isActive?'&#9679;':(gIdx+1)))+'</div>'+
        '<div class="step-info"><div class="step-name">'+step.name+'</div>'+
        '<div class="step-duration">'+(isDone?fmtMs(step.elapsed):(isActive?'\u0412 \u043f\u0440\u043e\u0446\u0435\u0441\u0441\u0435...':'\u041d\u0435 \u043d\u0430\u0447\u0430\u0442'))+'</div></div>'+
        (isActive?'<div class="step-timer-display" id="timer-'+job.id+'-'+step.id+'">00:00</div>':'')+
        (isDone?'<div style="font-size:14px;color:var(--green);font-weight:700;">'+fmtMs(step.elapsed)+'</div>':'')+
        '</div>'+
        '<div class="step-actions">'+
        (!isDone&&!isActive?'<button class="step-btn step-btn-start" onclick="startStep(\''+ job.id+'\',\''+ step.id+'\')">&#9654; \u0421\u0442\u0430\u0440\u0442</button>':'')+
        (isActive?'<button class="step-btn step-btn-stop" onclick="stopStep(\''+ job.id+'\',\''+ step.id+'\')">&#9632; \u0421\u0442\u043e\u043f</button>':'')+
        '<button class="step-btn step-btn-note" onclick="openStepNote(\''+ job.id+'\',\''+ step.id+'\')">&#9998; \u0417\u0430\u043c\u0435\u0442\u043a\u0430</button>'+
        (isDone?'<button class="step-btn step-btn-start" onclick="restartStep(\''+ job.id+'\',\''+ step.id+'\')">&#8635; \u0415\u0449\u0451</button>':'')+
        '</div>'+
        '<div class="quick-time-row">'+
        '<span style="font-size:11px;color:var(--text-dim);align-self:center;">+ \u043c\u0438\u043d:</span>'+
        [5,10,30,60].map(m => '<button class="qt-btn" onclick="addQuickTime(\''+ job.id+'\',\''+ step.id+'\','+m+')">'+ m+'\u043c</button>').join('')+
        '<button class="qt-btn qt-btn-custom" onclick="openCustomTime(\''+ job.id+'\',\''+ step.id+'\')">&#9998;</button>'+
        '</div>'+
        ((step.notes||step.parts)?'<div class="step-notes">'+(step.notes?'<div style="margin-bottom:4px;">'+step.notes+'</div>':'')+( step.parts?'<span class="note-tag">&#128295; '+step.parts+'</span>':'')+'</div>':'')+
        '</div>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
  job.steps.forEach(step => {
    if (step.running && step.startTime) startTimerDisplay(job.id, step.id, step.startTime, step.elapsed||0);
  });
}

  const container = document.getElementById('work-events-container');
  if (!container) return;
  let html = '';
  const dorabotki = job.dorabotki || [];
  const vozvrat = job.vozvrat || [];
  if (dorabotki.length === 0 && vozvrat.length === 0) { container.innerHTML = ''; return; }

  if (vozvrat.length > 0) {
    const totalV = vozvrat.reduce((a,r) => a+(r.elapsed||0), 0);
    html += '<div style="margin:0 16px 12px;background:rgba(230,130,30,0.06);border:1px solid rgba(230,130,30,0.3);border-radius:10px;overflow:hidden;">'+
      '<div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;">'+
      '<div style="font-size:15px;font-weight:700;color:#e6821e;">&#8617; \u0412\u043e\u0437\u0432\u0440\u0430\u0442\u044b ('+vozvrat.length+')</div>'+
      '<div style="font-size:13px;color:#e6821e;font-weight:700;">'+(totalV>0?fmtMs(totalV):'')+'</div></div>';
    vozvrat.forEach(r => {
      html += '<div style="padding:10px 16px;border-top:1px solid rgba(230,130,30,0.2);display:flex;justify-content:space-between;align-items:flex-start;">'+
        '<div style="flex:1;"><div style="font-size:13px;color:var(--text);">'+r.desc+'</div>'+
        '<div style="font-size:12px;color:var(--text-dim);margin-top:2px;">'+ fmtDate(r.date)+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:10px;">'+
        '<div style="font-size:14px;color:#e6821e;font-weight:700;">'+(r.elapsed?fmtMs(r.elapsed):'\u2014')+'</div>'+
        '<button onclick="openEventModal(\'vozvrat\',\''+ r.id+'\')" style="background:none;border:1px solid rgba(230,130,30,0.3);border-radius:4px;color:#e6821e;font-size:12px;padding:4px 8px;cursor:pointer;">&#9998;</button>'+
        '</div></div>';
    });
    html += '</div>';
  }

  if (dorabotki.length > 0) {
    const totalD = dorabotki.reduce((a,r) => a+(r.elapsed||0), 0);
    html += '<div style="margin:0 16px 12px;background:rgba(230,200,50,0.06);border:1px solid rgba(230,200,50,0.3);border-radius:10px;overflow:hidden;">'+
      '<div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;">'+
      '<div style="font-size:15px;font-weight:700;color:#e6c832;">&#8635; \u0414\u043e\u0440\u0430\u0431\u043e\u0442\u043a\u0438 ('+dorabotki.length+')</div>'+
      '<div style="font-size:13px;color:#e6c832;font-weight:700;">'+(totalD>0?fmtMs(totalD):'')+'</div></div>';
    dorabotki.forEach(r => {
      html += '<div style="padding:10px 16px;border-top:1px solid rgba(230,200,50,0.2);display:flex;justify-content:space-between;align-items:flex-start;">'+
        '<div style="flex:1;"><div style="font-size:13px;color:var(--text);">'+r.desc+'</div>'+
        '<div style="font-size:12px;color:var(--text-dim);margin-top:2px;">'+ fmtDate(r.date)+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:10px;">'+
        '<div style="font-size:14px;color:#e6c832;font-weight:700;">'+(r.elapsed?fmtMs(r.elapsed):'\u2014')+'</div>'+
        '<button onclick="openEventModal(\'dorabotka\',\''+ r.id+'\')" style="background:none;border:1px solid rgba(230,200,50,0.3);border-radius:4px;color:#e6c832;font-size:12px;padding:4px 8px;cursor:pointer;">&#9998;</button>'+
        '</div></div>';
    });
    html += '</div>';
  }
  container.innerHTML = html;
}

function startStep(jobId, stepId) {
  const d = load(), job = d.jobs.find(j => j.id === jobId);
  if (!job) return;
  const step = job.steps.find(s => s.id === stepId);
  if (!step) return;
  step.running = true; step.startTime = Date.now();
  save(d); openJob(jobId); showToast('\u042d\u0442\u0430\u043f \u043d\u0430\u0447\u0430\u0442');
}
function stopStep(jobId, stepId) {
  const d = load(), job = d.jobs.find(j => j.id === jobId);
  if (!job) return;
  const step = job.steps.find(s => s.id === stepId);
  if (!step) return;
  step.elapsed = (step.elapsed||0) + (Date.now() - step.startTime);
  step.running = false; step.startTime = null;
  save(d); clearInterval(timers[jobId+'_'+stepId]); delete timers[jobId+'_'+stepId];
  openJob(jobId); showToast('\u042d\u0442\u0430\u043f \u0437\u0430\u0432\u0435\u0440\u0448\u0451\u043d: '+fmtMs(step.elapsed));
}
function restartStep(jobId, stepId) {
  const d = load(), job = d.jobs.find(j => j.id === jobId);
  const step = job && job.steps.find(s => s.id === stepId);
  if (!step) return;
  step.running = true; step.startTime = Date.now();
  save(d); openJob(jobId);
}
function startTimerDisplay(jobId, stepId, startTime, prevElapsed) {
  const key = jobId+'_'+stepId;
  clearInterval(timers[key]);
  timers[key] = setInterval(() => {
    const el = document.getElementById('timer-'+jobId+'-'+stepId);
    if (!el) { clearInterval(timers[key]); return; }
    el.textContent = fmtMsLive(prevElapsed + (Date.now() - startTime));
  }, 500);
}

function openStepNote(jobId, stepId) {
  const d = load(), job = d.jobs.find(j => j.id === jobId);
  const step = job && job.steps.find(s => s.id === stepId);
  if (!step) return;
  noteTargetStep = {jobId, stepId};
  document.getElementById('note-modal-title').textContent = step.name;
  document.getElementById('note-problems').value = step.notes||'  ';
  document.getElementById('note-parts').value = step.parts||'  ';
  openModal('modal-note');
}
function saveStepNote() {
  if (!noteTargetStep) return;
  const {jobId, stepId} = noteTargetStep;
  const d = load(), job = d.jobs.find(j => j.id === jobId);
  const step = job && job.steps.find(s => s.id === stepId);
  if (!step) return;
  step.notes = document.getElementById('note-problems').value.trim();
  step.parts = document.getElementById('note-parts').value.trim();
  save(d); closeModal('modal-note'); openJob(jobId); showToast('\u0417\u0430\u043c\u0435\u0442\u043a\u0430 \u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u0430');
}

function addPhaseTime(jobId, phaseId, minutes) {
  const d = load(), job = d.jobs.find(j => j.id === jobId);
  if (!job) return;
  const ps = job.steps.filter(s => s.phase === phaseId);
  if (ps.length === 0) return;
  ps[0].elapsed = (ps[0].elapsed||0) + minutes*60000;
  save(d); openJob(jobId);
  showToast('+'+(minutes<60?minutes+'\u043c':(minutes/60)+'\u0447')+' \u2192 '+(phaseId==='service'?'Full Service':'\u0421\u0431\u043e\u0440\u043a\u0430'));
}
function openPhaseCustomTime(jobId, phaseId) {
  phaseCustomTarget = {jobId, phaseId};
  document.getElementById('inp-custom-min').value = '';
  openModal('modal-custom-time');
}
function togglePhaseDetail(jobId, phaseId) {
  const d = load(), job = d.jobs.find(j => j.id === jobId);
  if (!job) return;
  job['detail_open_'+phaseId] = !job['detail_open_'+phaseId];
  save(d);
  const detail = document.getElementById('detail-'+jobId+'-'+phaseId);
  const chevron = document.querySelector('#phase-'+jobId+'-'+phaseId+' .phase-chevron');
  if (detail) detail.classList.toggle('open');
  if (chevron) chevron.classList.toggle('open');
}
function addQuickTime(jobId, stepId, minutes) {
  const d = load(), job = d.jobs.find(j => j.id === jobId);
  if (!job) return;
  const step = job.steps.find(s => s.id === stepId);
  if (!step) return;
  step.elapsed = (step.elapsed||0) + minutes*60000;
  save(d); openJob(jobId); showToast('+'+minutes+'\u043c \u0434\u043e\u0431\u0430\u0432\u043b\u0435\u043d\u043e');
}
function openCustomTime(jobId, stepId) {
  customTimeTarget = {jobId, stepId};
  document.getElementById('inp-custom-min').value = '';
  openModal('modal-custom-time');
}
function applyCustomTime() {
  const val = parseInt(document.getElementById('inp-custom-min').value);
  if (!val || val <= 0) { showToast('\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u0447\u0438\u0441\u043b\u043e \u043c\u0438\u043d\u0443\u0442'); return; }
  closeModal('modal-custom-time');
  if (phaseCustomTarget) { addPhaseTime(phaseCustomTarget.jobId, phaseCustomTarget.phaseId, val); phaseCustomTarget = null; }
  else if (customTimeTarget) { addQuickTime(customTimeTarget.jobId, customTimeTarget.stepId, val); customTimeTarget = null; }
}

function completeJob() {
  if (!currentJobId) return;
  const d = load(), idx = d.jobs.findIndex(j => j.id === currentJobId);
  if (idx === -1) return;
  const job = d.jobs[idx];
  job.steps.forEach(step => {
    if (step.running) { step.elapsed = (step.elapsed||0)+(Date.now()-step.startTime); step.running=false; step.startTime=null; }
  });
  job.done = true; job.completedAt = Date.now();
  d.jobs.splice(idx, 1); if (!d.done) d.done = []; d.done.push(job); save(d);
  showToast('\u0420\u0430\u0431\u043e\u0442\u0430 \u0437\u0430\u0432\u0435\u0440\u0448\u0435\u043d\u0430 &#10003;'); navigate('home');
}
function deleteJob() {
  if (!currentJobId) return;
  if (!confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u044d\u0442\u0443 \u0437\u0430\u043f\u0438\u0441\u044c?')) return;
  const d = load(); d.jobs = d.jobs.filter(j => j.id !== currentJobId);
  save(d); showToast('\u0423\u0434\u0430\u043b\u0435\u043d\u043e'); navigate('home');
}

function openNewJobModal() {
  ['inp-serial','inp-ref','inp-model','inp-note'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  openModal('modal-new');
}
function createJob() {
  const ref = document.getElementById('inp-ref').value.trim();
  const serial = document.getElementById('inp-serial').value.trim();
  if (!ref && !serial) { showToast('\u0412\u0432\u0435\u0434\u0438\u0442\u0435 Ref \u0438\u043b\u0438 \u0441\u0435\u0440\u0438\u0439\u043d\u044b\u0439 \u043d\u043e\u043c\u0435\u0440'); return; }
  const type = document.getElementById('inp-type').value;
  const model = document.getElementById('inp-model').value.trim();
  const note = document.getElementById('inp-note').value.trim();
  const steps = getStepsFor(type).map(s => ({...s, startTime:null, elapsed:0, running:false, notes:'', parts:''}));
  const job = {id:Date.now().toString(), ref, model, serial, type, note, createdAt:Date.now(), steps, returns:[], dorabotki:[], vozvrat:[], done:false, completedAt:null};
  const d = load(); d.jobs.push(job); save(d);
  closeModal('modal-new'); showToast('\u0427\u0430\u0441\u044b \u0434\u043e\u0431\u0430\u0432\u043b\u0435\u043d\u044b');
  renderHome(); setTimeout(() => openJob(job.id), 300);
}

function openEventModal(type, eventId) {
  currentEventType = type;
  editingEventId = eventId || null;
  const isVozvrat = type === 'vozvrat';
  const color = isVozvrat ? '#e6821e' : '#e6c832';
  const title = isVozvrat ? '&#8617; \u0412\u043e\u0437\u0432\u0440\u0430\u0442' : '&#8635; \u0414\u043e\u0440\u0430\u0431\u043e\u0442\u043a\u0430';
  document.getElementById('event-modal-title').innerHTML = title;
  document.getElementById('event-modal-title').style.color = color;
  const saveBtn = document.getElementById('event-save-btn');
  saveBtn.style.background = isVozvrat?'rgba(230,130,30,0.15)':'rgba(230,200,50,0.15)';
  saveBtn.style.color = color;
  saveBtn.style.border = '1px solid '+(isVozvrat?'rgba(230,130,30,0.35)':'rgba(230,200,50,0.35)')+'';
  const hint = document.getElementById('event-edit-hint');
  if (eventId) {
    const d = load();
    const job = d.jobs.find(j => j.id===currentJobId)||(d.done||[]).find(j => j.id===currentJobId);
    const arr = isVozvrat ? (job?.vozvrat||[]) : (job?.dorabotki||[]);
    const ev = arr.find(r => r.id===eventId);
    if (!ev) return;
    document.getElementById('inp-event-desc').value = ev.desc;
    document.getElementById('inp-event-time').value = ev.elapsed ? Math.round(ev.elapsed/60000) : '';
    if (hint) { hint.style.display='block'; hint.textContent='\u0420\u0435\u0434\u0430\u043a\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435'; }
  } else {
    document.getElementById('inp-event-desc').value = '';
    document.getElementById('inp-event-time').value = '';
    if (hint) hint.style.display='none';
  }
  openModal('modal-event');
}

function saveEvent() {
  const desc = document.getElementById('inp-event-desc').value.trim();
  if (!desc) { showToast('\u041e\u043f\u0438\u0448\u0438\u0442\u0435 \u0441\u043e\u0431\u044b\u0442\u0438\u0435'); return; }
  const mins = parseInt(document.getElementById('inp-event-time').value) || 0;
  const d = load();
  let job = d.jobs.find(j => j.id===currentJobId)||(d.done||[]).find(j => j.id===currentJobId);
  if (!job) return;
  const isVozvrat = currentEventType === 'vozvrat';
  const arr = isVozvrat ? job.vozvrat : job.dorabotki;
  if (!arr) { if (isVozvrat) job.vozvrat=[]; else job.dorabotki=[]; }
  const target = isVozvrat ? job.vozvrat : job.dorabotki;
  if (editingEventId) {
    const ev = target.find(r => r.id===editingEventId);
    if (ev) { ev.desc=desc; ev.elapsed=mins*60000; }
    showToast('\u0421\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u043e');
  } else {
    target.push({id:Date.now().toString(), desc, elapsed:mins*60000, date:Date.now()});
    showToast(isVozvrat?'\u0412\u043e\u0437\u0432\u0440\u0430\u0442 \u0434\u043e\u0431\u0430\u0432\u043b\u0435\u043d':'\u0414\u043e\u0440\u0430\u0431\u043e\u0442\u043a\u0430 \u0434\u043e\u0431\u0430\u0432\u043b\u0435\u043d\u0430');
  }
  save(d); closeModal('modal-event'); editingEventId=null;
  const isDone = !!(d.done||[]).find(j => j.id===currentJobId);
  if (isDone) { renderHistory(); openHistoryDetail(currentJobId); }
  else openJob(currentJobId);
}

function deleteEvent(jobId, eventId, type) {
  const d = load();
  const job = d.jobs.find(j => j.id===jobId)||(d.done||[]).find(j => j.id===jobId);
  if (!job) return;
  if (type==='vozvrat') job.vozvrat = (job.vozvrat||[]).filter(r => r.id!==eventId);
  else job.dorabotki = (job.dorabotki||[]).filter(r => r.id!==eventId);
  save(d); showToast('\u0423\u0434\u0430\u043b\u0435\u043d\u043e');
  const isDone = !!(d.done||[]).find(j => j.id===jobId);
  if (isDone) { renderHistory(); openHistoryDetail(jobId); }
  else openJob(jobId);
}

function deleteFromHistory(id) {
  if (!confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u044d\u0442\u0438 \u0447\u0430\u0441\u044b \u0438\u0437 \u0438\u0441\u0442\u043e\u0440\u0438\u0438?')) return;
  const d = load(); d.done = (d.done||[]).filter(j => j.id!==id);
  save(d); closeModal('modal-history-detail'); showToast('\u0417\u0430\u043f\u0438\u0441\u044c \u0443\u0434\u0430\u043b\u0435\u043d\u0430'); renderHistory();
}

function historyCard(j, compact) {
  const total = totalTime(j);
  const fsTime = j.steps.filter(s => s.phase==='service').reduce((a,s) => a+(s.elapsed||0), 0);
  const asTime = j.steps.filter(s => s.phase==='assembly').reduce((a,s) => a+(s.elapsed||0), 0);
  const hasDorab = j.dorabotki && j.dorabotki.length > 0;
  const hasVozvrat = j.vozvrat && j.vozvrat.length > 0;
  const borderCls = hasVozvrat?'card-vozvrat':(hasDorab?'card-dorabotka':'');
  return '<div class="history-item '+borderCls+'" onclick="openHistoryDetail(\''+ j.id+'\')">'+
    '<div class="history-header"><div class="history-ref">'+(j.serial||j.ref)+'</div>'+
    '<div class="history-date">'+fmtDate(j.completedAt||j.createdAt)+'</div></div>'+
    '<div class="history-model">'+(j.ref?'Ref '+j.ref:'')+(j.ref&&j.model?' \xb7 ':'')+( j.model||'')+'</div>'+
    '<div class="history-times">'+
    '<div class="history-time">\u0418\u0442\u043e\u0433\u043e: <span>'+fmtMs(total)+'</span></div>'+
    (j.type==='full'?'<div class="history-time">Service: <span>'+fmtMs(fsTime)+'</span></div>':'')+
    '<div class="history-time">\u0421\u0431\u043e\u0440\u043a\u0430: <span>'+fmtMs(asTime)+'</span></div>'+
    speedBadges(j)+
    (hasDorab?'<span class="badge badge-dorabotka">&#8635; \xd7'+j.dorabotki.length+'</span>':'')+
    (hasVozvrat?'<span class="badge badge-vozvrat">&#8617; \xd7'+j.vozvrat.length+'</span>':'')+
    '</div></div>';
}

function renderHistory() {
  const d = load();
  const q = (document.getElementById('history-search')?.value || '').toLowerCase().trim();
  let done = (d.done||[]).slice().reverse();
  if (q) done = done.filter(j =>
    (j.serial||''). toLowerCase().includes(q)||(j.ref||''). toLowerCase().includes(q)||
    (j.model||''). toLowerCase().includes(q)||(j.note||''). toLowerCase().includes(q)||
    j.steps.some(s => (s.notes||''). toLowerCase().includes(q)||(s.parts||''). toLowerCase().includes(q))||
    (j.dorabotki||[]).some(r => r.desc.toLowerCase().includes(q))||
    (j.vozvrat||[]).some(r => r.desc.toLowerCase().includes(q)));
  document.getElementById('history-count').textContent = done.length+'\u00a0\u0447\u0430\u0441\u043e\u0432'+(q?' (\u043d\u0430\u0439\u0434\u0435\u043d\u043e)':'  ');
  const list = document.getElementById('history-list');
  list.innerHTML = done.length===0
    ? '<div class="empty-state"><div class="empty-icon">&#128203;</div><div class="empty-title">'+(q?'\u041d\u0438\u0447\u0435\u0433\u043e \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\u043e':'\u0418\u0441\u0442\u043e\u0440\u0438\u044f \u043f\u0443\u0441\u0442\u0430')+'</div></div>'
    : done.map(j => historyCard(j, false)).join('');
}

  const phases = job.type==='full'?[{id:'service',label:'Full Service'},{id:'assembly',label:'\u0421\u0431\u043e\u0440\u043a\u0430'}]:[{id:'assembly',label:'\u0421\u0431\u043e\u0440\u043a\u0430'}];

    });

      '<div style="padding:12px 14px;display:flex;justify-content:space-between;">'+
      '<div style="font-size:14px;font-weight:700;color:#e6821e;">&#8617; \u0412\u043e\u0437\u0432\u0440\u0430\u0442\u044b ('+vozvrat.length+')</div>'+
      '<div style="font-size:13px;color:#e6821e;font-weight:700;">'+(totalV>0?fmtMs(totalV):'')+'</div></div>';
    vozvrat.forEach(r => {
      html += '<div style="padding:10px 14px;border-top:1px solid rgba(230,130,30,0.2);display:flex;justify-content:space-between;align-items:flex-start;">'+
        '<div style="flex:1;"><div style="font-size:14px;color:var(--text);">'+r.desc+'</div>'+
        '<div style="font-size:12px;color:var(--text-dim);margin-top:2px;">'+ fmtDate(r.date)+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:10px;">'+
        '<div style="font-size:14px;color:#e6821e;font-weight:700;">'+(r.elapsed?fmtMs(r.elapsed):'\u2014')+'</div>'+
        '<button onclick="closeModal(\'modal-history-detail\');openEventModal(\'vozvrat\',\''+ r.id+'\')" style="background:none;border:1px solid rgba(230,130,30,0.3);border-radius:4px;color:#e6821e;font-size:12px;padding:4px 8px;cursor:pointer;">&#9998;</button>'+
        '<button onclick="deleteEvent(\''+ id+'\',\''+ r.id+'\',\'vozvrat\')" style="background:none;border:1px solid rgba(201,76,76,0.3);border-radius:4px;color:#c94c4c;font-size:12px;padding:4px 8px;cursor:pointer;">&#10005;</button>'+
        '</div></div>';
    });
    html += '</div>';
  }

  const dorabotki = job.dorabotki || [];
  if (dorabotki.length > 0) {
    const totalD = dorabotki.reduce((a,r) => a+(r.elapsed||0), 0);
    html += '<div style="margin-top:14px;background:rgba(230,200,50,0.06);border:1px solid rgba(230,200,50,0.3);border-radius:8px;overflow:hidden;">'+
      '<div style="padding:12px 14px;display:flex;justify-content:space-between;">'+
      '<div style="font-size:14px;font-weight:700;color:#e6c832;">&#8635; \u0414\u043e\u0440\u0430\u0431\u043e\u0442\u043a\u0438 ('+dorabotki.length+')</div>'+
      '<div style="font-size:13px;color:#e6c832;font-weight:700;">'+(totalD>0?fmtMs(totalD):'')+'</div></div>';
    dorabotki.forEach(r => {
      html += '<div style="padding:10px 14px;border-top:1px solid rgba(230,200,50,0.2);display:flex;justify-content:space-between;align-items:flex-start;">'+
        '<div style="flex:1;"><div style="font-size:14px;color:var(--text);">'+r.desc+'</div>'+
        '<div style="font-size:12px;color:var(--text-dim);margin-top:2px;">'+ fmtDate(r.date)+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:10px;">'+
        '<div style="font-size:14px;color:#e6c832;font-weight:700;">'+(r.elapsed?fmtMs(r.elapsed):'\u2014')+'</div>'+
        '<button onclick="closeModal(\'modal-history-detail\');openEventModal(\'dorabotka\',\''+ r.id+'\')" style="background:none;border:1px solid rgba(230,200,50,0.3);border-radius:4px;color:#e6c832;font-size:12px;padding:4px 8px;cursor:pointer;">&#9998;</button>'+
        '<button onclick="deleteEvent(\''+ id+'\',\''+ r.id+'\',\'dorabotka\')" style="background:none;border:1px solid rgba(201,76,76,0.3);border-radius:4px;color:#c94c4c;font-size:12px;padding:4px 8px;cursor:pointer;">&#10005;</button>'+
        '</div></div>';
    });
    html += '</div>';
  }

  html += '<button class="btn btn-gold" style="margin-top:16px;" onclick="openEditJob(\''+ id+'\')">&#9998; \u0420\u0435\u0434\u0430\u043a\u0442\u0438\u0440\u043e\u0432\u0430\u0442\u044c</button>'+
    '<button class="btn" style="background:rgba(230,200,50,0.1);color:#e6c832;border:1px solid rgba(230,200,50,0.35);margin-top:8px;" onclick="closeModal(\'modal-history-detail\');openEventModal(\'dorabotka\')">&#8635; \u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0434\u043e\u0440\u0430\u0431\u043e\u0442\u043a\u0443</button>'+
    '<button class="btn" style="background:rgba(230,130,30,0.1);color:#e6821e;border:1px solid rgba(230,130,30,0.35);margin-top:8px;" onclick="closeModal(\'modal-history-detail\');openEventModal(\'vozvrat\')">&#8617; \u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0432\u043e\u0437\u0432\u0440\u0430\u0442</button>'+
    '<button class="btn btn-danger" onclick="deleteFromHistory(\''+ id+'\')" style="margin-top:8px;">\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u0438\u0437 \u0438\u0441\u0442\u043e\u0440\u0438\u0438</button>'+
    '<button class="btn btn-outline" onclick="closeModal(\'modal-history-detail\')">\u0417\u0430\u043a\u0440\u044b\u0442\u044c</button>';
  document.getElementById('hd-body').innerHTML = html;
  openModal('modal-history-detail');
}

function openEditJob(id) {
  const d = load(), job = (d.done||[]).find(j => j.id===id);
  if (!job) return;
  closeModal('modal-history-detail');
  const phases = job.type==='full'?[{id:'service',label:'Full Service'},{id:'assembly',label:'\u0421\u0431\u043e\u0440\u043a\u0430'}]:[{id:'assembly',label:'\u0421\u0431\u043e\u0440\u043a\u0430'}];
  let html = '<div class="form-group"><label class="form-label">\u0421\u0435\u0440\u0438\u0439\u043d\u044b\u0439 \u043d\u043e\u043c\u0435\u0440</label><input class="form-input" id="edit-serial" value="'+(job.serial||'')+'" /></div>'+
    '<div class="form-row"><div class="form-group"><label class="form-label">Ref</label><input class="form-input" id="edit-ref" value="'+(job.ref||'')+'" /></div>'+
    '<div class="form-group"><label class="form-label">\u041c\u043e\u0434\u0435\u043b\u044c</label><input class="form-input" id="edit-model" value="'+(job.model||'')+'" /></div></div>'+
    '<div class="form-group"><label class="form-label">\u0417\u0430\u043c\u0435\u0442\u043a\u0430</label><textarea class="form-textarea" id="edit-note">'+(job.note||'')+'</textarea></div>';

phases.forEach(phase => {
const ps = job.steps.filter(s => s.phase===phase.id);
const pt = ps.reduce((a,s) => a+(s.elapsed||0), 0);
const pm = Math.round(pt/60000);
const hasDet = ps.some(s => s.elapsed>0);
html += ‘<div style="margin:14px 0 8px;">’+
‘<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">’+
‘<label class="form-label" style="margin:0;">’+phase.label+’ (\u043c\u0438\u043d)</label>’+
(hasDet?’<span style="font-size:12px;color:var(--text-dim);cursor:pointer;" onclick="toggleEditDetails(\'details-'+ phase.id+'\')">≡ \u043f\u043e\u044d\u0442\u0430\u043f\u043d\u043e</span>’:’’)+
‘</div><input class="form-input edit-phase-time" data-phase="'+phase.id+'" type="number" value="'+pm+'" min="0" /></div>’;
html += ‘<div id="details-'+phase.id+'" style="display:none;margin-bottom:8px;padding:10px;background:var(--bg3);border-radius:6px;">’;
ps.forEach(step => {
const m = step.elapsed ? Math.round(step.elapsed/60000) : 0;
html += ‘<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">’+
‘<div style="font-size:13px;color:var(--text-dim);flex:1;">’+step.name+’</div>’+
‘<input class="form-input edit-step-time" data-stepid="'+step.id+'" type="number" value="'+m+'" min="0" style="width:80px;padding:6px;font-size:14px;" /></div>’;
});
html += ‘</div>’;
});
html += ‘<button class="btn btn-gold" style="margin-top:8px;" onclick="saveEditJob(\''+ id+'\')">\u0421\u043e\u0445\u0440\u0430\u043d\u0438\u0442\u044c</button>’+
‘<button class="btn btn-outline" onclick="closeModal(\'modal-edit-job\')">\u041e\u0442\u043c\u0435\u043d\u0430</button>’;
document.getElementById(‘edit-job-body’).innerHTML = html;
openModal(‘modal-edit-job’);
}
function toggleEditDetails(id) { const el=document.getElementById(id); if(el) el.style.display=el.style.display===‘none’?‘block’:‘none’; }
function saveEditJob(id) {
const d = load(), job = (d.done||[]).find(j => j.id===id);
if (!job) return;
job.serial = document.getElementById(‘edit-serial’).value.trim();
job.ref    = document.getElementById(‘edit-ref’).value.trim();
job.model  = document.getElementById(‘edit-model’).value.trim();
job.note   = document.getElementById(‘edit-note’).value.trim();
const stepInputs = document.querySelectorAll(’.edit-step-time’);
if (stepInputs.length > 0) {
stepInputs.forEach(inp => { const step=job.steps.find(s => s.id===inp.dataset.stepid); if(step) step.elapsed=Math.round((parseFloat(inp.value)||0)*60000); });
} else {
document.querySelectorAll(’.edit-phase-time’).forEach(inp => {
const ps=job.steps.filter(s => s.phase===inp.dataset.phase);
if(ps.length>0) ps[0].elapsed=Math.round((parseFloat(inp.value)||0)*60000);
});
}
save(d); closeModal(‘modal-edit-job’); showToast(’\u0418\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u044f \u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u044b’); renderHistory();
}

function renderStats() {
const d = load(), done = d.done||[];
const totalJobs = done.length;
const fullJobs = done.filter(j => j.type===‘full’).length;
const assemblyOnly = done.filter(j => j.type===‘assembly’).length;
const avgTotal = totalJobs>0 ? done.reduce((a,j) => a+totalTime(j),0)/totalJobs : 0;
const dorabCount = done.filter(j => j.dorabotki && j.dorabotki.length>0).length;
const vozvratCount = done.filter(j => j.vozvrat && j.vozvrat.length>0).length;
const vozvratPct = totalJobs>0 ? Math.round(vozvratCount/totalJobs*100) : 0;
document.getElementById(‘stats-grid’).innerHTML =
‘<div class="stat-card"><div class="stat-card-val">’+totalJobs+’</div><div class="stat-card-lbl">\u0417\u0430\u0432\u0435\u0440\u0448\u0435\u043d\u043e</div></div>’+
‘<div class="stat-card"><div class="stat-card-val">’+fmtMs(avgTotal)+’</div><div class="stat-card-lbl">\u0421\u0440\u0435\u0434\u043d\u0435\u0435 \u0432\u0440\u0435\u043c\u044f</div></div>’+
‘<div class="stat-card"><div class="stat-card-val">’+fullJobs+’</div><div class="stat-card-lbl">Full Service</div></div>’+
‘<div class="stat-card"><div class="stat-card-val">’+assemblyOnly+’</div><div class="stat-card-lbl">\u0422\u043e\u043b\u044c\u043a\u043e \u0421\u0431\u043e\u0440\u043a\u0430</div></div>’+
‘<div class="stat-card" style="border-color:'+(dorabCount>0?'rgba(230,200,50,0.4)':'var(--border)')+'"><div class="stat-card-val" style="color:'+(dorabCount>0?'#e6c832':'var(--gold)')+';">’+dorabCount+’</div><div class="stat-card-lbl">↻ \u0414\u043e\u0440\u0430\u0431\u043e\u0442\u043e\u043a</div></div>’+
‘<div class="stat-card" style="border-color:'+(vozvratPct>20?'rgba(230,130,30,0.4)':'var(--border)')+'"><div class="stat-card-val" style="color:'+(vozvratPct>20?'#e6821e':vozvratPct>10?'#e6ac00':'var(--green)')+';">’+vozvratPct+’%</div><div class="stat-card-lbl">↩ % \u0432\u043e\u0437\u0432\u0440\u0430\u0442\u043e\u0432</div></div>’;

const fullDone = done.filter(j => j.type===‘full’);
const asmDone = done.filter(j => j.type===‘assembly’);
if (fullDone.length > 0) {
const s = countSpeed(fullDone, ‘full’);
speedHtml += ‘<div style="margin:0 16px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;">’+
‘<div style="font-size:12px;color:var(--text-dim);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;">Full Service \u2014 \u0441\u043a\u043e\u0440\u043e\u0441\u0442\u044c</div>’+
‘<div style="display:flex;gap:10px;">’+
‘<div style="flex:1;text-align:center;padding:10px;background:rgba(76,175,130,0.08);border:1px solid rgba(76,175,130,0.25);border-radius:8px;"><div style="font-size:22px;font-weight:700;color:#4caf82;">’+s.fast+’</div><div style="font-size:11px;color:var(--text-dim);">⚡ ≤5\u0447</div></div>’+
‘<div style="flex:1;text-align:center;padding:10px;background:rgba(255,193,7,0.08);border:1px solid rgba(255,193,7,0.25);border-radius:8px;"><div style="font-size:22px;font-weight:700;color:#e6ac00;">’+s.mid+’</div><div style="font-size:11px;color:var(--text-dim);">⏱ 6\u20137\u0447</div></div>’+
‘<div style="flex:1;text-align:center;padding:10px;background:rgba(201,76,76,0.08);border:1px solid rgba(201,76,76,0.25);border-radius:8px;"><div style="font-size:22px;font-weight:700;color:#c94c4c;">’+s.slow+’</div><div style="font-size:11px;color:var(--text-dim);">🐢 ≥8\u0447</div></div>’+
‘</div></div>’;
}
if (asmDone.length > 0) {
const s = countSpeed(asmDone, ‘assembly’);
speedHtml += ‘<div style="margin:0 16px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;">’+
‘<div style="font-size:12px;color:var(--text-dim);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;">\u0421\u0431\u043e\u0440\u043a\u0430 \u2014 \u0441\u043a\u043e\u0440\u043e\u0441\u0442\u044c</div>’+
‘<div style="display:flex;gap:10px;">’+
‘<div style="flex:1;text-align:center;padding:10px;background:rgba(76,175,130,0.08);border:1px solid rgba(76,175,130,0.25);border-radius:8px;"><div style="font-size:22px;font-weight:700;color:#4caf82;">’+s.fast+’</div><div style="font-size:11px;color:var(--text-dim);">⚡ <3\u0447</div></div>’+
‘<div style="flex:1;text-align:center;padding:10px;background:rgba(255,193,7,0.08);border:1px solid rgba(255,193,7,0.25);border-radius:8px;"><div style="font-size:22px;font-weight:700;color:#e6ac00;">’+s.mid+’</div><div style="font-size:11px;color:var(--text-dim);">⏱ 3\u20134\u0447</div></div>’+
‘<div style="flex:1;text-align:center;padding:10px;background:rgba(201,76,76,0.08);border:1px solid rgba(201,76,76,0.25);border-radius:8px;"><div style="font-size:22px;font-weight:700;color:#c94c4c;">’+s.slow+’</div><div style="font-size:11px;color:var(--text-dim);">🐢 ≥5\u0447</div></div>’+
‘</div></div>’;
}
document.getElementById(‘stats-speed’).innerHTML = speedHtml;
}
const stageChart = document.getElementById(‘stage-chart’);
if (done.length===0) { stageChart.innerHTML=’<div style="font-size:13px;color:var(--text-dim);text-align:center;padding:12px;">\u041d\u0435\u0442 \u0434\u0430\u043d\u043d\u044b\u0445</div>’; }
else {
const sm = {};
done.forEach(j => j.steps.forEach(s => {
if (!sm[s.id]) sm[s.id]={name:s.name,total:0,count:0};
if (s.elapsed>0) { sm[s.id].total+=s.elapsed; sm[s.id].count++; }
}));
const stages = Object.values(sm).filter(s => s.count>0).map(s => ({name:s.name,avg:s.total/s.count})).sort((a,b) => b.avg-a.avg).slice(0,8);
const maxA = Math.max(…stages.map(s => s.avg),1);
stageChart.innerHTML = stages.map(s =>
‘<div class="bar-row"><div class="bar-label" title="'+s.name+'">’+s.name.split(’ ‘)[0]+’</div>’+
‘<div class="bar-track"><div class="bar-fill" style="width:'+(s.avg/maxA*100).toFixed(1)+'%"></div></div>’+
‘<div class="bar-val">’+fmtMs(s.avg)+’</div></div>’
).join(’’);
}
const aF = fullJobs>0?done.filter(j=>j.type===‘full’).reduce((a,j)=>a+totalTime(j),0)/fullJobs:0;
const aA = assemblyOnly>0?done.filter(j=>j.type===‘assembly’).reduce((a,j)=>a+totalTime(j),0)/assemblyOnly:0;
const mT = Math.max(aF,aA,1);
document.getElementById(‘type-chart’).innerHTML =
‘<div class="bar-row"><div class="bar-label">Full Service</div><div class="bar-track"><div class="bar-fill" style="width:'+(aF/mT*100).toFixed(1)+'%"></div></div><div class="bar-val">’+fmtMs(aF)+’</div></div>’+
‘<div class="bar-row"><div class="bar-label">\u0421\u0431\u043e\u0440\u043a\u0430</div><div class="bar-track"><div class="bar-fill" style="width:'+(aA/mT*100).toFixed(1)+'%;background:var(--blue)"></div></div><div class="bar-val">’+fmtMs(aA)+’</div></div>’;
}

function exportData() {
const d = load();
const blob = new Blob([JSON.stringify(d,null,2)],{type:‘application/json’});
const url = URL.createObjectURL(blob);
const a = document.createElement(‘a’);
a.href=url; a.download=‘service-tracker-backup-’+new Date().toISOString().slice(0,10)+’.json’;
a.click(); URL.revokeObjectURL(url);
showToast(’\u0414\u0430\u043d\u043d\u044b\u0435 \u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u044b \u0432 \u0444\u0430\u0439\u043b’);
}
function importData(input) {
const file = input.files[0]; if (!file) return;
const reader = new FileReader();
reader.onload = function(e) {
try {
const data = JSON.parse(e.target.result);
if (!data.jobs||!data.done) throw new Error(‘bad’);
localStorage.setItem(‘rst_data’,JSON.stringify(data));
showToast(’\u0418\u043c\u043f\u043e\u0440\u0442 \u0443\u0441\u043f\u0435\u0448\u0435\u043d! \u0417\u0430\u0433\u0440\u0443\u0436\u0435\u043d\u043e ‘+( data.done||[]).length+’ \u0437\u0430\u043f\u0438\u0441\u0435\u0439’);
setTimeout(()=>{renderHome();navigate(‘home’);},1000);
} catch(err) { showToast(’\u041e\u0448\u0438\u0431\u043a\u0430 \u0444\u0430\u0439\u043b\u0430’); }
input.value=’’;
};
reader.readAsText(file);
}

function toggleTheme() {
const isLight = document.documentElement.classList.toggle(‘light’);
localStorage.setItem(‘rst_theme’, isLight?‘light’:‘dark’);
document.getElementById(‘theme-btn’).textContent = isLight?’🌙 \u0422\u0451\u043c\u043d\u0430\u044f’:’☀️ \u0421\u0432\u0435\u0442\u043b\u0430\u044f’;
}
if (localStorage.getItem(‘rst_theme’)===‘light’) {
document.documentElement.classList.add(‘light’);
window.addEventListener(‘load’, () => {
const btn=document.getElementById(‘theme-btn’);
if(btn) btn.textContent=’🌙 \u0422\u0451\u043c\u043d\u0430\u044f’;
});
}

renderHome();
</script>

</body>
</html>
