* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 18px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── TOP BAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-gold);
  padding: max(env(safe-area-inset-top), 20px) 20px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-title {
  font-family: 'Outfit', sans-serif;
  font-size: 22px; font-weight: 500;
  letter-spacing: 0.12em;
  color: var(--gold);
}
.topbar-subtitle { font-size: 12px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; }

/* ── BOTTOM NAV ── */
.bottomnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(10,10,10,0.97);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border-gold);
  padding: 14px 0 max(env(safe-area-inset-bottom), 16px);
  display: flex;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: var(--text-dim);
  font-family: 'Outfit', sans-serif; font-size: 12px; letter-spacing: 0.1em;
  cursor: pointer; padding: 4px 0; transition: color 0.2s;
}
.nav-btn.active { color: var(--gold); }
.nav-btn svg { width: 22px; height: 22px; }

/* ── PAGES ── */
.page { display: none; padding: 0 0 100px; margin-top: 80px; }
.page.active { display: block; }

/* ── SECTION HEADER ── */
.section-header {
  padding: 20px 20px 12px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.section-title {
  font-family: 'Outfit', sans-serif;
  font-size: 26px; font-weight: 400; color: var(--text);
  letter-spacing: 0.05em;
}
.section-meta { font-size: 13px; color: var(--text-dim); letter-spacing: 0.15em; }

/* ── CARDS ── */
.card {
  margin: 0 16px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.card:active { border-color: var(--gold-dim); }
.card-header {
  padding: 14px 16px 10px;
  display: flex; align-items: flex-start; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.card-ref {
  font-family: 'Outfit', sans-serif;
  font-size: 22px; font-weight: 500; color: var(--gold);
  letter-spacing: 0.08em;
}
.card-model { font-size: 13px; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.1em; }
.badge {
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 2px; font-weight: 500;
}
.badge-full { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid var(--border-gold); }
.badge-assembly { background: rgba(76,130,201,0.12); color: var(--blue); border: 1px solid rgba(76,130,201,0.25); }
.badge-active { background: rgba(76,175,130,0.12); color: var(--green); border: 1px solid rgba(76,175,130,0.25); }
.badge-done { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid var(--border); }

.card-body { padding: 12px 16px; }
.card-progress {
  display: flex; gap: 3px; margin-bottom: 10px;
}
.progress-dot {
  flex: 1; height: 3px; border-radius: 1px;
  background: var(--border);
  transition: background 0.3s;
}
.progress-dot.done { background: var(--gold); }
.progress-dot.active { background: var(--gold-light); animation: pulse-bar 1.5s ease-in-out infinite; }

@keyframes pulse-bar {
  0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
}

.card-stats { display: flex; gap: 16px; }
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-val { font-size: 16px; color: var(--text); }
.stat-lbl { font-size: 11px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }

.card-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-date { font-size: 13px; color: var(--text-dim); }
.card-action {
  font-size: 13px; color: var(--gold); letter-spacing: 0.1em;
  text-transform: uppercase; cursor: pointer;
}

/* ── ACTIVE STEP INDICATOR ── */
.active-step {
  margin: 0 16px 12px;
  background: rgba(201,168,76,0.06);
  border: 1px solid var(--border-gold);
  border-radius: 4px;
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.active-step-info {}
.active-step-label { font-size: 13px; color: var(--gold-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
.active-step-name { font-family: 'Outfit', sans-serif; font-size: 20px; color: var(--text); }
.active-step-timer { font-size: 26px; color: var(--gold); letter-spacing: 0.05em; font-weight: 300; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 80px); right: 20px;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--gold); color: #000;
  border: none; cursor: pointer; z-index: 99;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(201,168,76,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}
.fab:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(201,168,76,0.3); }
.fab svg { width: 22px; height: 22px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(4px);
  display: none; align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal {
  width: 100%; background: var(--bg2);
  border-top: 1px solid var(--border-gold);
  border-radius: 12px 12px 0 0;
  padding: 0 0 env(safe-area-inset-bottom, 20px);
  max-height: 92vh; overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal-handle {
  width: 36px; height: 3px; background: var(--border);
  border-radius: 2px; margin: 12px auto 0;
}
.modal-title {
  font-family: 'Outfit', sans-serif;
  font-size: 24px; font-weight: 400;
  padding: 16px 20px 0;
  color: var(--gold);
  letter-spacing: 0.08em;
}
.modal-body { padding: 16px 20px; }

/* ── FORM ── */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 6px;
}
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px; color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 16px;
  padding: 10px 12px;
  outline: none; transition: border-color 0.2s;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--gold-dim);
}
.form-textarea { resize: none; min-height: 80px; }
.form-select option { background: var(--bg3); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── BUTTONS ── */
.btn {
  width: 100%; padding: 14px;
  border-radius: 3px; border: none;
  font-family: 'Outfit', sans-serif;
  font-size: 14px; letter-spacing: 0.18em;
  text-transform: uppercase; cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.btn:active { transform: scale(0.98); opacity: 0.85; }
.btn-gold { background: var(--gold); color: #000; }
.btn-outline {
  background: none; color: var(--text-dim);
  border: 1px solid var(--border);
  margin-top: 8px;
}
.btn-danger { background: rgba(201,76,76,0.15); color: var(--red); border: 1px solid rgba(201,76,76,0.25); margin-top: 8px; }

/* ── WORK PAGE ── */
.steps-container { padding: 0 16px; }
.steps-title {
  font-family: 'Outfit', sans-serif;
  font-size: 17px; color: var(--text-dim);
  letter-spacing: 0.12em; text-transform: uppercase;
  margin: 16px 0 8px;
  display: flex; align-items: center; gap: 8px;
}
.steps-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.step-item {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 4px; margin-bottom: 8px;
  overflow: hidden; transition: border-color 0.2s;
}
.step-item.step-active { border-color: var(--gold-dim); }
.step-item.step-done { border-color: var(--border); opacity: 0.7; }

.step-header {
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
}
.step-num {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--text-dim); flex-shrink: 0;
  transition: all 0.2s;
}
.step-active .step-num { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
.step-done .step-num { border-color: var(--green); color: var(--green); background: rgba(76,175,130,0.1); }

.step-info { flex: 1; }
.step-name { font-size: 15px; color: var(--text); letter-spacing: 0.05em; }
.step-duration { font-size: 13px; color: var(--text-dim); margin-top: 2px; }

.step-timer-display {
  font-size: 18px; color: var(--gold); letter-spacing: 0.04em;
}

.step-actions {
  padding: 0 14px 12px;
  display: flex; gap: 8px;
}
.step-btn {
  flex: 1; padding: 10px; border-radius: 3px; border: none;
  font-family: 'Outfit', sans-serif; font-size: 13px;
  letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.15s;
}
.step-btn:active { opacity: 0.7; }
.step-btn-start { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid var(--border-gold); }
.step-btn-stop { background: rgba(201,76,76,0.12); color: var(--red); border: 1px solid rgba(201,76,76,0.25); }
.step-btn-note { background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); }

.step-notes {
  padding: 0 14px 12px;
  font-size: 14px; color: var(--text-dim); line-height: 1.5;
  border-top: 1px solid var(--border); margin-top: 4px; padding-top: 10px;
}
.note-tag {
  display: inline-block;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 2px; padding: 2px 6px;
  font-size: 13px; color: var(--text-mid); margin: 2px 2px 0 0;
}

/* ── STATS PAGE ── */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 0 16px 16px;
}
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 4px; padding: 14px;
}
.stat-card-val {
  font-family: 'Outfit', sans-serif;
  font-size: 32px; color: var(--gold); font-weight: 300;
}
.stat-card-lbl { font-size: 12px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px; }

.chart-container {
  margin: 0 16px 16px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 4px; padding: 16px;
}
.chart-title {
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px;
}
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 13px; color: var(--text-dim); width: 100px; flex-shrink: 0; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
.bar-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.6s ease; }
.bar-val { font-size: 13px; color: var(--text-dim); width: 42px; text-align: right; flex-shrink: 0; }

/* ── HISTORY PAGE ── */
.history-item {
  margin: 0 16px 10px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 4px; padding: 14px 16px;
  cursor: pointer;
}
.history-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
.history-ref {
  font-family: 'Outfit', sans-serif;
  font-size: 20px; color: var(--gold); letter-spacing: 0.08em;
}
.history-date { font-size: 13px; color: var(--text-dim); }
.history-model { font-size: 13px; color: var(--text-mid); margin-bottom: 8px; }
.history-times { display: flex; gap: 12px; flex-wrap: wrap; }
.history-time { font-size: 13px; color: var(--text-dim); }
.history-time span { color: var(--text-mid); }

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 60px 40px; text-align: center;
}
.empty-icon { font-size: 44px; margin-bottom: 16px; opacity: 0.3; }
.empty-title {
  font-family: 'Outfit', sans-serif;
  font-size: 22px; color: var(--text-dim); margin-bottom: 8px;
}
.empty-text { font-size: 14px; color: var(--text-dim); line-height: 1.6; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 4px 16px 16px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 90px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--bg3); border: 1px solid var(--border-gold);
  color: var(--text-mid); font-size: 11px; letter-spacing: 0.08em;
  padding: 10px 18px; border-radius: 3px;
  opacity: 0; transition: all 0.3s; pointer-events: none;
  white-space: nowrap; z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── PHASE BLOCK ── */
.phase-block {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 12px; overflow: hidden;
}
.phase-block-header {
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.phase-block-header:active { opacity: 0.7; }
.phase-block-left {}
.phase-block-title { font-size: 16px; font-weight: 600; color: var(--text); }
.phase-block-meta { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
.phase-block-right { display: flex; align-items: center; gap: 8px; }
.phase-total { font-size: 16px; color: var(--gold); font-weight: 600; }
.phase-chevron { font-size: 11px; color: var(--text-dim); transition: transform 0.25s; display: inline-block; }
.phase-chevron.open { transform: rotate(180deg); }

.phase-quick-times {
  padding: 0 14px 14px;
  border-top: 1px solid var(--border);
}
.phase-qt-label {
  font-size: 11px; color: var(--text-dim); letter-spacing: 0.12em;
  text-transform: uppercase; margin: 12px 0 8px;
}
.phase-qt-row { display: flex; gap: 8px; flex-wrap: wrap; }
.phase-qt-btn {
  padding: 10px 0; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3); color: var(--text);
  font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; flex: 1;
  text-align: center;
}
.phase-qt-btn:active { background: var(--bg4); border-color: var(--gold-dim); color: var(--gold); }
.phase-qt-btn-custom {
  background: none; border-style: dashed; color: var(--text-dim); flex: 1;
}

.phase-steps-detail {
  border-top: 1px solid var(--border);
  display: none; padding: 8px 0;
}
.phase-steps-detail.open { display: block; }

/* ── QUICK TIME ── */
.quick-time-row {
  padding: 0 14px 12px;
  display: flex; gap: 6px; flex-wrap: wrap;
}
.qt-btn {
  padding: 7px 12px; border-radius: 3px; border: 1px solid var(--border);
  background: var(--bg3); color: var(--text-dim);
  font-family: 'Outfit', sans-serif; font-size: 13px;
  cursor: pointer; transition: all 0.15s;
}
.qt-btn:active { background: var(--bg4); color: var(--gold); border-color: var(--gold-dim); }
.qt-btn-custom {
  background: none; color: var(--text-dim);
  border: 1px dashed var(--border);
}

/* ── RETURN (REWORK) ── */
.badge-return { background: rgba(201,76,76,0.15); color: #e05555; border: 1px solid rgba(201,76,76,0.4); }
.card-return { border-color: rgba(201,76,76,0.45) !important; }
.return-block {
  margin: 0 16px 12px;
  background: rgba(201,76,76,0.06);
  border: 1px solid rgba(201,76,76,0.3);
  border-radius: 8px; overflow: hidden;
}
.return-block-header {
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.return-block-title { font-size: 15px; font-weight: 600; color: #e05555; }
.return-item {
  padding: 10px 16px; border-top: 1px solid rgba(201,76,76,0.2);
  display: flex; justify-content: space-between; align-items: flex-start;
}
.return-item-desc { font-size: 13px; color: var(--text); flex: 1; }
.return-item-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.return-item-time { font-size: 14px; color: #e05555; font-weight: 600; flex-shrink: 0; margin-left: 12px; }

/* ── SPEED BADGE ── */
.speed-badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
}
.speed-fast { background: rgba(76,175,130,0.15); color: #4caf82; border: 1px solid rgba(76,175,130,0.35); }
.speed-mid  { background: rgba(255,193,7,0.15);  color: #e6ac00; border: 1px solid rgba(255,193,7,0.35); }
.speed-slow { background: rgba(201,76,76,0.15);  color: #c94c4c; border: 1px solid rgba(201,76,76,0.35); }

/* scrollbar */
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 1px; }

<div class="page active" id="page-home">
  <div class="section-header">
    <div class="section-title">Активные</div>
    <div class="section-meta" id="home-count">— часов</div>
  </div>
  <div id="active-jobs-list"></div>
  <div class="divider"></div>
  <div class="section-header">

<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const FULL_STEPS = [
  { id: 'measure',   name: 'Замер показаний / осмотр' },
  { id: 'disassem',  name: 'Разборка' },
  { id: 'precleaning', name: 'Pre-cleaning + люфты' },
  { id: 'cleaning',  name: 'Cleaning (машина ~40 мин)' },
  { id: 'service',   name: 'Сборка механизма' },
  { id: 'mechcheck', name: 'Проверка хода механизма' },
];

const ASSEMBLY_STEPS = [
  { id: 'dial',      name: 'Установка циферблата' },
  { id: 'hands',     name: 'Выбор и установка стрелок' },
  { id: 'colleague', name: 'Проверка у коллеги' },
  { id: 'polish',    name: 'Проверка полировки корпуса' },
  { id: 'casebuild', name: 'Сборка корпуса (тюб, стекло, безель)' },
  { id: 'waterproof','name': 'Waterproof тест' },
  { id: 'mechanism', name: 'Установка механизма в корпус' },
  { id: 'cleanlook', name: 'Финальная проверка чистоты' },
  { id: 'close',     name: 'Закрытие + снятие показаний' },
  { id: 'bracelet',  name: 'Браслет + end links' },
  { id: 'qa',        name: 'Отправка на QA' },
];

function getStepsFor(type) {
  if (type === 'full') return [
    ...FULL_STEPS.map(s => ({...s, phase:'service'})),
    ...ASSEMBLY_STEPS.map(s => ({...s, phase:'assembly'}))
  ];
  return ASSEMBLY_STEPS.map(s => ({...s, phase:'assembly'}));
}

// ─── STORAGE ────────────────────────────────────────────────────────────────

function load() {
  try {
    const raw = localStorage.getItem('rst_data');
    if (!raw) return {jobs:[], done:[]};
    const d = JSON.parse(raw);
    if (!d.jobs) d.jobs = [];
    if (!d.done) d.done = [];
    // Migrate: ensure all jobs have returns array
    [...d.jobs, ...d.done].forEach(j => {
      if (!j.returns) j.returns = [];
      if (!j.steps) j.steps = [];
      j.steps.forEach(s => {
        if (!s.elapsed) s.elapsed = 0;
        if (s.running === undefined) s.running = false;
      });
    });
    return d;
  } catch(e) {
    console.warn('Data load error, resetting:', e);
    return {jobs:[], done:[]};
  }
}
function save(d) { localStorage.setItem('rst_data', JSON.stringify(d)); }

// ─── STATE ──────────────────────────────────────────────────────────────────

let currentJobId = null;
let noteTargetStep = null;
let timers = {}; // jobId_stepId -> intervalId

// ─── CLOCK ──────────────────────────────────────────────────────────────────

function updateClock() {
  const now = new Date();
  document.getElementById('topbar-clock').textContent =
    now.toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ─── NAVIGATION ─────────────────────────────────────────────────────────────

function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page)?.classList.add('active');
  document.querySelector('.fab').style.display = page === 'home' ? 'flex' : 'none';

  if (page === 'stats') renderStats();
  if (page === 'history') renderHistory();
  if (page === 'home') renderHome();
}

function goBack() {
  navigate('home');
}

// ─── MODAL ──────────────────────────────────────────────────────────────────

function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ─── TOAST ──────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── FORMAT ─────────────────────────────────────────────────────────────────

function fmtMs(ms) {
  if (!ms || ms < 0) return '—';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}ч ${m%60}м`;
  if (m > 0) return `${m}м ${s%60}с`;
  return `${s}с`;
}

function fmtMsLive(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const mm = String(m%60).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  if (h > 0) return `${h}:${mm}:${ss}`;
  return `${mm}:${ss}`;
}

function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('ru', {day:'numeric', month:'short', year:'numeric'});
}

function speedBadge(hours, type) {
  if (type === 'full') {
    if (hours <= 5) return `<span class="speed-badge speed-fast">⚡ Быстро</span>`;
    if (hours <= 7) return `<span class="speed-badge speed-mid">⏱ Средне</span>`;
    return `<span class="speed-badge speed-slow">🐢 Долго</span>`;
  } else {
    if (hours < 3) return `<span class="speed-badge speed-fast">⚡ Быстро</span>`;
    if (hours <= 4) return `<span class="speed-badge speed-mid">⏱ Хорошо</span>`;
    return `<span class="speed-badge speed-slow">🐢 Долго</span>`;
  }
}

function totalTime(job) {
  return job.steps.reduce((acc, s) => acc + (s.elapsed || 0), 0);
}

// ─── CREATE JOB ─────────────────────────────────────────────────────────────

function openNewJobModal() {
  document.getElementById('inp-ref').value = '';
  document.getElementById('inp-model').value = '';
  document.getElementById('inp-serial').value = '';
  document.getElementById('inp-note').value = '';
  openModal('modal-new');
}

function createJob() {
  const ref = document.getElementById('inp-ref').value.trim();
  const model = document.getElementById('inp-model').value.trim();
  if (!ref) { showToast('Введите Ref номер'); return; }

  const type = document.getElementById('inp-type').value;
  const serial = document.getElementById('inp-serial').value.trim();
  const note = document.getElementById('inp-note').value.trim();

  const steps = getStepsFor(type).map(s => ({
    ...s, startTime: null, elapsed: 0, running: false,
    notes: '', parts: ''
  }));

  const job = {
    id: Date.now().toString(),
    ref, model, serial, type, note,
    createdAt: Date.now(),
    steps,
    done: false,
    completedAt: null
  };

  const d = load();
  d.jobs.push(job);
  save(d);

  closeModal('modal-new');
  showToast('Часы добавлены');
  renderHome();
  setTimeout(() => openJob(job.id), 300);
}

// ─── RENDER HOME ────────────────────────────────────────────────────────────

function renderHome() {
  const d = load();
  const active = d.jobs.filter(j => !j.done);
  const recent = (d.done || []).slice(-5).reverse();

  document.getElementById('home-count').textContent = active.length + ' активных';

  const al = document.getElementById('active-jobs-list');
  if (active.length === 0) {
    al.innerHTML = `<div class="empty-state"><div class="empty-icon">⌚</div><div class="empty-title">Нет активных работ</div><div class="empty-text">Нажмите + чтобы добавить часы</div></div>`;
  } else {
    al.innerHTML = active.map(j => jobCard(j)).join('');
  }

  const rl = document.getElementById('recent-jobs-list');
  document.getElementById('recent-count').textContent = recent.length > 0 ? recent.length + ' завершённых' : '';
  if (recent.length === 0) {
    rl.innerHTML = `<div style="padding:12px 16px 0;font-size:11px;color:var(--text-dim);">Завершённые работы появятся здесь</div>`;
  } else {
    rl.innerHTML = recent.map(j => historyCard(j, true)).join('');
  }
}

function jobCard(j) {
  const steps = j.steps;
  const total = steps.length;
  const done = steps.filter(s => s.elapsed > 0 && !s.running).length;
  const activeStep = steps.find(s => s.running);
  const elapsed = totalTime(j);

  const dots = steps.map((s, i) => {
    let cls = '';
    if (s.running) cls = 'active';
    else if (s.elapsed > 0) cls = 'done';
    return `<div class="progress-dot ${cls}"></div>`;
  }).join('');

  const hasReturn = j.returns && j.returns.length > 0;
  const typeBadge = j.type === 'full'
    ? `<span class="badge badge-full">Full Service</span>`
    : `<span class="badge badge-assembly">Сборка</span>`;

  const statusBadge = activeStep
    ? `<span class="badge badge-active">● В работе</span>`
    : `<span class="badge">${done}/${total}</span>`;

  const returnBadge = hasReturn ? `<span class="badge badge-return">🔴 Возврат ×${j.returns.length}</span>` : '';

  return `
  <div class="card ${hasReturn ? 'card-return' : ''}" onclick="openJob('${j.id}')">
    <div class="card-header">
      <div>
        <div class="card-ref">${j.serial || j.ref}</div>
        <div class="card-model">${j.ref ? 'Ref ' + j.ref : ''}${j.ref && j.model ? ' · ' : ''}${j.model || ''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        ${typeBadge}${statusBadge}${returnBadge}
      </div>
    </div>
    <div class="card-body">
      <div class="card-progress">${dots}</div>
      <div class="card-stats">
        <div class="stat"><div class="stat-val">${fmtMs(elapsed) || '—'}</div><div class="stat-lbl">Потрачено</div></div>
        <div class="stat"><div class="stat-val">${done}/${total}</div><div class="stat-lbl">Этапов</div></div>
        ${activeStep ? `<div class="stat"><div class="stat-val" style="color:var(--gold)">${activeStep.name.split(' ')[0]}…</div><div class="stat-lbl">Сейчас</div></div>` : ''}
      </div>
    </div>
    <div class="card-footer">
      <div class="card-date">${fmtDate(j.createdAt)}</div>
      <div class="card-action">Открыть →</div>
    </div>
  </div>`;
}

// ─── OPEN JOB ───────────────────────────────────────────────────────────────

function openJob(id) {
  const d = load();
  const job = d.jobs.find(j => j.id === id) || (d.done||[]).find(j => j.id === id);
  if (!job) return;

  currentJobId = id;
  document.getElementById('work-ref').textContent = job.serial || job.ref;
  document.getElementById('work-model').textContent = (job.ref ? 'Ref ' + job.ref : '') + (job.ref && job.model ? ' · ' : '') + (job.model || '');
  document.getElementById('work-badge').innerHTML = job.type === 'full'
    ? `<span class="badge badge-full">Full Service + Сборка</span>`
    : `<span class="badge badge-assembly">Только Сборка</span>`;

  renderWorkSteps(job);
  renderReturns(job);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-work').classList.add('active');
  document.querySelector('.fab').style.display = 'none';
}

function renderWorkSteps(job) {
  const container = document.getElementById('work-steps-container');
  let html = '';

  const phases = job.type === 'full'
    ? [{id:'service', label:'Full Service'}, {id:'assembly', label:'Сборка'}]
    : [{id:'assembly', label:'Сборка'}];

  phases.forEach(phase => {
    const phaseSteps = job.steps.filter(s => s.phase === phase.id);
    const phaseElapsed = phaseSteps.reduce((a, s) => a + (s.elapsed || 0), 0);
    const doneCount = phaseSteps.filter(s => s.elapsed > 0).length;
    const isDetailOpen = job['detail_open_' + phase.id] || false;

    // Quick time buttons for the whole phase: 15m, 30m, 1h, 2h, 4h, 8h
    const quickTimes = [{label:'15м', min:15},{label:'30м', min:30},{label:'1ч', min:60},{label:'2ч', min:120},{label:'4ч', min:240},{label:'8ч', min:480}];

    html += `
    <div class="phase-block" id="phase-${job.id}-${phase.id}">
      <div class="phase-block-header" onclick="togglePhaseDetail('${job.id}','${phase.id}')">
        <div class="phase-block-left">
          <div class="phase-block-title">${phase.label}</div>
          <div class="phase-block-meta">${doneCount}/${phaseSteps.length} этапов${phaseElapsed > 0 ? ' · ' + fmtMs(phaseElapsed) : ''}</div>
        </div>
        <div class="phase-block-right">
          ${phaseElapsed > 0 ? `<span class="phase-total">${fmtMs(phaseElapsed)}</span>` : ''}
          <span class="phase-chevron ${isDetailOpen ? 'open' : ''}">▼</span>
        </div>
      </div>

      <div class="phase-quick-times">
        <div class="phase-qt-label">Быстро записать время на весь этап</div>
        <div class="phase-qt-row">
          ${quickTimes.map(t => `<button class="phase-qt-btn" onclick="addPhaseTime('${job.id}','${phase.id}',${t.min})">${t.label}</button>`).join('')}
          <button class="phase-qt-btn phase-qt-btn-custom" onclick="openPhaseCustomTime('${job.id}','${phase.id}')">✎</button>
        </div>
      </div>

      <div class="phase-steps-detail ${isDetailOpen ? 'open' : ''}" id="detail-${job.id}-${phase.id}">
        ${phaseSteps.map((step) => {
          const globalIdx = job.steps.indexOf(step);
          const isDone = step.elapsed > 0 && !step.running;
          const isActive = step.running;
          let cls = isActive ? 'step-active' : (isDone ? 'step-done' : '');
          const elapsed = step.elapsed || 0;
          return `
          <div class="step-item ${cls}" style="margin:0 10px 8px;border-radius:6px;" id="step-${job.id}-${step.id}">
            <div class="step-header">
              <div class="step-num">${isDone ? '✓' : (isActive ? '●' : (globalIdx+1))}</div>
              <div class="step-info">
                <div class="step-name">${step.name}</div>
                <div class="step-duration">${isDone ? fmtMs(elapsed) : (isActive ? 'В процессе...' : 'Не начат')}</div>
              </div>
              ${isActive ? `<div class="step-timer-display" id="timer-${job.id}-${step.id}">00:00</div>` : ''}
              ${isDone ? `<div style="font-size:13px;color:var(--green);font-weight:600;">${fmtMs(elapsed)}</div>` : ''}
            </div>
            <div class="step-actions">

// ─── STEP CONTROLS ──────────────────────────────────────────────────────────

function startStep(jobId, stepId) {
  const d = load();
  const job = d.jobs.find(j => j.id === jobId);
  if (!job) return;
  const step = job.steps.find(s => s.id === stepId);
  if (!step) return;

  step.running = true;
  step.startTime = Date.now();
  save(d);

  openJob(jobId);
  showToast('Этап начат');
}

function stopStep(jobId, stepId) {
  const d = load();
  const job = d.jobs.find(j => j.id === jobId);
  if (!job) return;
  const step = job.steps.find(s => s.id === stepId);
  if (!step) return;

  const now = Date.now();
  step.elapsed = (step.elapsed || 0) + (now - step.startTime);
  step.running = false;
  step.startTime = null;
  save(d);

  clearInterval(timers[jobId + '_' + stepId]);
  delete timers[jobId + '_' + stepId];

  openJob(jobId);
  showToast('Этап завершён: ' + fmtMs(step.elapsed));
}

function restartStep(jobId, stepId) {
  const d = load();
  const job = d.jobs.find(j => j.id === jobId);
  const step = job?.steps.find(s => s.id === stepId);
  if (!step) return;
  step.running = true;
  step.startTime = Date.now();
  save(d);
  openJob(jobId);
}

function startTimerDisplay(jobId, stepId, startTime, prevElapsed) {
  const key = jobId + '_' + stepId;
  clearInterval(timers[key]);
  timers[key] = setInterval(() => {
    const el = document.getElementById(`timer-${jobId}-${stepId}`);
    if (!el) { clearInterval(timers[key]); return; }
    const total = prevElapsed + (Date.now() - startTime);
    el.textContent = fmtMsLive(total);
  }, 500);
}

// ─── COMPLETE / DELETE JOB ──────────────────────────────────────────────────

function completeJob() {
  if (!currentJobId) return;
  const d = load();
  const idx = d.jobs.findIndex(j => j.id === currentJobId);
  if (idx === -1) return;

  const job = d.jobs[idx];

  // Stop any running steps
  job.steps.forEach(step => {
    if (step.running) {
      step.elapsed = (step.elapsed||0) + (Date.now() - step.startTime);
      step.running = false;
      step.startTime = null;
    }
  });

  job.done = true;
  job.completedAt = Date.now();

  d.jobs.splice(idx, 1);
  if (!d.done) d.done = [];
  d.done.push(job);
  save(d);

  showToast('Работа завершена ✓');
  navigate('home');
}

function deleteJob() {
  if (!currentJobId) return;
  if (!confirm('Удалить эту запись?')) return;
  const d = load();
  d.jobs = d.jobs.filter(j => j.id !== currentJobId);
  save(d);
  showToast('Удалено');
  navigate('home');
}

// Type chart
const typeChart = document.getElementById(‘type-chart’);
const avgFull = fullJobs > 0 ? done.filter(j=>j.type===‘full’).reduce((a,j)=>a+totalTime(j),0)/fullJobs : 0;
const avgAssembly = assemblyOnly > 0 ? done.filter(j=>j.type===‘assembly’).reduce((a,j)=>a+totalTime(j),0)/assemblyOnly : 0;
const maxT = Math.max(avgFull, avgAssembly, 1);
typeChart.innerHTML = ` <div class="bar-row"> <div class="bar-label">Full Service</div> <div class="bar-track"><div class="bar-fill" style="width:${(avgFull/maxT*100).toFixed(1)}%"></div></div> <div class="bar-val">${fmtMs(avgFull)}</div> </div> <div class="bar-row"> <div class="bar-label">Только Сборка</div> <div class="bar-track"><div class="bar-fill" style="width:${(avgAssembly/maxT*100).toFixed(1)}%;background:var(--blue)"></div></div> <div class="bar-val">${fmtMs(avgAssembly)}</div> </div>`;
}

// ─── PHASE QUICK TIME ────────────────────────────────────────────────────────

let phaseCustomTarget = null;

function addPhaseTime(jobId, phaseId, minutes) {
const d = load();
const job = d.jobs.find(j => j.id === jobId);
if (!job) return;
// Distribute time evenly across all phase steps, or add to first step as a lump
// Simplest: add to a virtual phase-level elapsed stored on first step of phase
const phaseSteps = job.steps.filter(s => s.phase === phaseId);
if (phaseSteps.length === 0) return;
// Add all time to the first step of the phase (represents the phase total)
phaseSteps[0].elapsed = (phaseSteps[0].elapsed || 0) + minutes * 60 * 1000;
save(d);
openJob(jobId);
showToast(`+${minutes < 60 ? minutes + ' мин' : (minutes/60) + ' ч'} → ${phaseId === 'service' ? 'Full Service' : 'Сборка'}`);
}

function openPhaseCustomTime(jobId, phaseId) {
phaseCustomTarget = {jobId, phaseId};
document.getElementById(‘inp-custom-min’).value = ‘’;
openModal(‘modal-custom-time’);
}

function togglePhaseDetail(jobId, phaseId) {
const d = load();
const job = d.jobs.find(j => j.id === jobId);
if (!job) return;
job[‘detail_open_’ + phaseId] = !job[‘detail_open_’ + phaseId];
save(d);
// Toggle without full re-render for smoothness
const detail = document.getElementById(`detail-${jobId}-${phaseId}`);
const chevron = document.querySelector(`#phase-${jobId}-${phaseId} .phase-chevron`);
if (detail) detail.classList.toggle(‘open’);
if (chevron) chevron.classList.toggle(‘open’);
}

// ─── QUICK TIME ─────────────────────────────────────────────────────────────

let customTimeTarget = null;

function addQuickTime(jobId, stepId, minutes) {
const d = load();
const job = d.jobs.find(j => j.id === jobId);
if (!job) return;
const step = job.steps.find(s => s.id === stepId);
if (!step) return;

step.elapsed = (step.elapsed || 0) + minutes * 60 * 1000;
// If step wasn’t started yet, mark it as done
if (!step.running) {
step.running = false;
step.startTime = null;
}
save(d);
openJob(jobId);
showToast(`+${minutes} мин добавлено`);
}

function openCustomTime(jobId, stepId) {
customTimeTarget = {jobId, stepId};
document.getElementById(‘inp-custom-min’).value = ‘’;
openModal(‘modal-custom-time’);
}

function applyCustomTime() {
const val = parseInt(document.getElementById(‘inp-custom-min’).value);
if (!val || val <= 0) { showToast(‘Введите число минут’); return; }
closeModal(‘modal-custom-time’);
if (phaseCustomTarget) {
addPhaseTime(phaseCustomTarget.jobId, phaseCustomTarget.phaseId, val);
phaseCustomTarget = null;
} else if (customTimeTarget) {
addQuickTime(customTimeTarget.jobId, customTimeTarget.stepId, val);
customTimeTarget = null;
}
}

// ─── THEME ───────────────────────────────────────────────────────────────────

function toggleTheme() {
const isLight = document.documentElement.classList.toggle(‘light’);
localStorage.setItem(‘rst_theme’, isLight ? ‘light’ : ‘dark’);
document.getElementById(‘theme-btn’).textContent = isLight ? ‘🌙 Тёмная’ : ‘☀️ Светлая’;
}

if (localStorage.getItem(‘rst_theme’) === ‘light’) {
document.documentElement.classList.add(‘light’);
document.addEventListener(‘DOMContentLoaded’, () => {
const btn = document.getElementById(‘theme-btn’);
if (btn) btn.textContent = ‘🌙 Тёмная’;
});
}

// ─── INIT ────────────────────────────────────────────────────────────────────

renderHome();
</script>
